body:
  text: 丹霞法孫今釋重編示衆示衆汝等諸人大須識自本心始得休歇若識心達本如空合空維摩經云不著世間如蓮華常善入於空寂行達諸法相無挂礙稽首如空無所依莊嚴大師教徒常持此偈生死海中大可怖畏溈山行腳至天台山遇寒山拾得一陳茫然寒山云自靈山別後伊三生為國王忘却了也果上菩薩出生入死尚且忘却何況博地凡夫如今不用汝棒喝交馳機鋒酬對古人喚作弄精魂漢且看六祖教永嘉何不體取無生了取無速永嘉云體即無生了本無速祖云如是如是何等機辨神妙何等入理深談良久云老僧少時誦華嚴空忍品遂不知有身心器界如此境界將有旬日至今每一提起猶見痛快示衆修行一著自肯方親所謂道不是文字語言乃平常之理昨有人問不是心不是佛不是物是箇什麼老僧豎起拂子復問畢竟是箇什麼老僧放下拂子只今且問諸人那箇眼不見耳不聞者箇又是什麼一切有為法如夢幻泡影且莫當面錯過此事不是一口道得盡底縱饒說得極玄極妙總沒交涉惟得之於心方有把柄汝諸人一向逐色隨聲不曾有一刻回光返照所以日疏月遠然雖汝不曾打點其實現現十成無一毫增減畢竟是箇什麼努力搆取示衆昔大隨在大溈會下數載食不至充臥不求暖清苦鍊行操履不群溈深器之一日問曰闍黎在老僧此間不曾問一轉話隨云教某甲向什麼處下口溈云何不問如何是佛隨便作手勢掩溈口溈歎云子真得其髓大衆且看大隨云教某甲向什麼處下口直是針劄不入佛眼亦無能窺他正恁麼時大溈尚不肯草草放過復教他問如何是佛隨掩其口溈乃點頭古人為人十分嚴密如此大衆何不體取若在者裏透得過何禪可參何道可學還消說什麼者事人人具足爭奈有人飯籮邊抵餓覓即知君不可見不離當處常湛然珍重說菩薩戒示衆即心是佛即心是法即心是僧即心是戒定慧情與無情世出世間一切諸法皆無實性所謂諸法實性即汝心是楞伽云諸法無法體而說惟是心不見於自心而起於分別所以一切諸法依心建立心外無有法可得法外無有心可得是謂心法一如無心無法諸佛子如此者即是金剛寶戒佛性種子諸佛本源菩薩根本衆生若得此戒即頓入佛位經云衆生受佛戒即入諸佛位位同大覺已真是諸佛子戒之大意祇在防非禁惡護持本有清淨自心若識自心心外無有一法為緣為對既無緣對便無所犯既無所犯亦無能持無能無所始名持戒爭奈一切衆生迷本淨心遂有根塵等法既有諸法又生愛取諸趣發動身口造一切業既有業因寧逃於果所以三塗苦報輪回生死無有紀極然而窮詰本源實無根緒此迷無本性畢竟空衆生不知妄受繫縛我佛出世生大憐愍於上根者直示本心俾得醒悟中下根者方便提獎教伊止惡行善乃有戒法應作不應作是持是犯種種名相若大力量人豈有者等閒家具佛之一字尚不喜聞更喚什麼作戒然雖如是大須實落始得不然畫虎成貍莽莽蕩蕩招殃禍其害不淺所以此戒非初心可忽涅槃喻如浮囊遺教再三丁寧尊重珍敬波羅提木叉如佛在世良以生滅界中未能頓超方便直下無心若無戒善終不成就則必墮落人天之報尚且難期況於諸佛無上菩提是以從迷返悟戒實資糧從因向果戒為初步至於內護自心外護譏嫌自利利他猶為菩薩行願從來學佛之士頂戴奉持如饑得食如渴得飲如貧得寶如裸得衣誠非無故諸佛子當於此寶戒生珍重想勿令有犯雖云無心則無戒然須知無心始可得戒有心者常犯戒故無戒始可得心有戒者常繫心故無心之心乃真佛心無戒之戒始為性戒此心此戒無二無別佛之授受祖之相傳惟斯祕密非與人天及餘二乘諸戒律儀而可比量涅槃云我皆安置諸子於祕密藏中祕密藏中具足三德三德圓滿一心呈露由是萬行莊嚴華嚴性海重重無盡亦非於自本心別有毫頭增入昔世尊菩提樹下成等正覺歎云奇哉一切衆生具有如來智慧德相但以妄想執著而不證得若離妄想一切智無礙智無師智即得現前諸佛子汝等但看離妄一句世尊真切拈出教人直下無心汝若無心更有何事德山云汝但無事於心無心於事則虗而靈空而妙若毫端許言本末者皆為自欺起信論云一切諸法惟依妄念而有差別若離妄念則無一切境界之相如是則內自無心外自無境心境俱亡戒從誰立諸佛子既無戒可得畢竟喚作什麼良久云咄且受戒去茶話廣慧茶話山僧到此承王居士暨大行殷勤山僧沒有什麼說話大衆有疑請問衆無語師乃云山僧自小學道將三十年實無有法可得祇信得自心及心外無有一法可得佛佛相傳祖祖相授也祇是信得自心及于今佛法凋零諸方每說什麼法身邊事法身向上事山僧者裏都無宗門下事無可商量若是大根器人言下知歸方有箇商量處更不可特地起波濤也古人道即心是佛一句滿口道盡亦是事不獲已今人多是將心學道將心求法若將心學道將心求法窮劫盡形終不能得為何如此祇為心外實無有法可得心外若有法可得是名外道大衆切須自己轉變自己回頭始得良久云大衆沒有什麼問山僧沒有什麼答更妙得很珍重廣慧茶話識心達本原故號為沙門大衆還識得心麼若識不得生死到來如何回互昔有僧問洞山寒暑到來如何回避山云何不向無寒暑處回避僧云無寒暑處怎生回避山云寒時寒殺闍黎熱時熱殺闍黎大衆作麼生會若會得者話方有箇回互處壯色不停喻如奔馬人命無常過於山水莫說人世富貴功名沒有長久就是出家兒沒有世緣幾十年光景也易過去何不趁色力康健討箇著落須是回光達本有箇出身之路始得僧問某甲不識心請和尚慈悲師云慈悲在你那裏僧問金剛經四句偈不知是那四句師云不離闍黎問底進云不會師云你不會是謗經毀法僧問清淨本然云何忽生山河大地師云我者裏也沒有清淨本然也沒有山河大地今晚廣慧當家印初請山僧喫茶會麼僧罔措僧問阿賴耶識末那識六識某甲心未了求示安身立命處師云你是看教乘來教乘與宗乘不同我宗門中總無此話進云心性意識是同是別生天墮獄為是心去性去識去師云者裏心也無性也無識也無進云恁麼則寒灰枯木也師云寒灰枯木怎會說話怎會在者裏喫茶進云不會求和尚方便師云三世諸佛阿誰代你乃云此事不在言說也不得離言說當日法性寺二僧爭論風幡六祖大師出云不是風動不是幡動仁者心動大衆還會得麼僧便問心不在內不在外不在中間敢問在什麼處師云有米煮飯沒米煮粥良久云一堂僧冷淡千古意分明于今一堂何等停當珍重華首茶話師云山僧本擬深藏山谷無意出頭今日華首元是法字卍子一線機緣後因麗首座及大衆諸居士費了許多心力接得山僧到此與大衆同住須是真實發心為生死真實修行才不虗住此山若論宗門中事大難開口上根人又何消說中下之根古人不已垂手方便才有做工夫話其實有什麼工夫可做古人道直指二字早是曲了也才說無事早是多事了也恁麼有甚開口處所以道此事惟我自知又道須知有不求知者丹霞和尚云人人有一坐具地佛祖出頭來一毫也不曾增即今諸上座諸居士在此也一毫不曾減祇是于今一聞千悟底大難不得不假方便大衆須費一番心力始得良久云同來大衆一路也辛苦到此正好安心既安職事各要努力有什麼疑不好相問僧問華首重興即不問覿面相逢意若何師云兩眼對兩眼進云海風連夜發大地絶纖塵時如何師云獨坐華首臺僧禮拜師復云者件事不是說了便罷真實要見得性真實自己要休得休得休不得試自家揣看若論說得底儘有聰明伶俐便說一篇兩篇不難看些禪關䇿進高峯中峯諸録便不消悟道也會教人有什麼交涉舉一老宿一夏不為師僧說話一僧歎云我直恁麼空過一夏便聞得正因二字也好宿云闍黎莫𧬊速若論正因一字也無道了叩齒云我不合恁麼道鄰房一老宿聞之云可惜一鍋羮被兩顆老鼠屎污却師云隔江望見資福門前剎竿便回已遲八刻何況更過江來此事豈容一棒一喝一機一境一轉兩轉語湊泊得上大難大難大衆須是從生死發心始有實落山僧少年時那曉什麼參禪什麼悟道祇是怕生死到來前路渺然後見壇經始知見性成佛沒奈何千計百較才得甘心不是等閒容易良久云山僧年來多病體中太弱叢林事俱料理不得須仗諸上座同心協力惟佛法却委不得了若有商量不敢辜負如今天下到處荒亂此地還安穩深山中如住靜一般大家鍛鍊身心却好珍重生辰茶話師云山僧今早舉王老師空劫以前話諸上座作麼生會王老師又道道不屬知不屬不知知是妄覺不知是無記諸上座又作麼生既道祇是無人覺知又道道不屬知不屬不知得底人便不消疑擬疑擬著萬里崖州去也所以山僧道擬心即差諸上座會得便會更無剩法古人也有道明得那邊事却來者邊行履山僧道也無那邊也無者邊得者便得更無時節汝但了得目前空劫以前也在目前盡未來劫也在目前不見道古人說知見知見即是心當心即知見知見即于今所以了得便是不了目前萬緣差別良久云者箇事也有生而知之者也有學而知之者究竟都是一般生而知之實難其人求之諸祖中如丹霞趙州便是生知底趙州見南泉泉問汝是有主沙彌無主沙彌州云有主沙彌泉云主在什麼處州躬身云孟春猶寒伏惟和尚尊候萬福諸上座向者裏便好打翻消息一切時行住坐臥折旋俯仰迎賓接客屙矢送尿無不是神通妙用趙州當時才十四歲何曾費些子氣力次日問南泉如何是道泉云平常心是道汝看南泉也不消什麼機用直如家裏人說家裏事州又問還用趨向也無泉云擬向即乖州云不擬爭知是道泉向道適來舉者幾句道不屬知不屬不知知是妄覺不知是無記若真達不疑之道猶如太虗廓然蕩豁豈可強是非耶諸上座道不屬知不屬不知者兩句勿輕放過汝等喫飯飽了要行便行要坐便坐山是山水是水僧是僧俗是俗正恁麼時佛眼也覷不見只可惜當下錯過了山僧記得幼時見箇少林法師拈僧問趙州學人乍入叢林乞師指示州云你喫粥了也未僧云喫粥了也州云洗鉢盂去山僧彼時雖不曾徹底聞之使毛骨悚然如冷水澆背又聞舉萬松評云洗面觸著鼻孔抽鞋摩著腳跟那時若錯過話頭便是掘地討天所以可憐不知底人錯過了多少好時光山僧恁麼說汝諸人聽著便又思量怎麼得知又是頭上安頭以眼尋眼古人道饒汝學到佛邊猶是雜用心山僧常舉此話為甚學到佛邊猶是雜用心圓覺云乃至證於如來清淨涅槃猶為我相到者裏須是悟始得咦不知者既錯過了許多好時光知者又蹉過了許多好時光不知者過在不知知者過在知最難得恰好畢竟如何得恰好去諸上座實有恁麼事若信不及便罷若信得及須實實體會實實了當始得者箇比不得世間功業祇是一生便了生死是我等無量劫來至於今日今若了得永不可得大須著力山僧千說萬說不過助發而已切之一字却在當人阿誰替汝著力得僧問月影汪汪如何是佛度衆生師云木頭進云月影汪汪時如何是衆生度佛師云碌磚進云如何是衆生度盡恆沙佛諸佛從來不異人師云前兩語汝作麼生會僧罔措僧問一箇道士賣靈符為甚處處吉利師云汝者兩片皮播來播去作麼進云和尚不識好惡師云山僧不識好惡且置上座不識好惡又作麼生進云一箇團團圓到處皆和合師云者是贓底進云和尚又作麼生師云山僧慙惶無地僧禮拜起擬進語師云止止不須說便歸方丈茶話舉張拙秀才偈光明寂照遍河沙凡聖含靈共一家一念不生全體現六根才動被雲遮破除煩惱重增病趨向真如亦是邪隨順世緣無挂礙涅槃生死等空花師云諸上座大須腳踏實地始得古人驗人一言半句便知渠知有不知有所以人將語探若是知有底自然迥別即如作家相見如兩鏡相照終不雜亂若只你一句我一句祇圖口頭滑溜有什麼用處莫謂今時上古已即有此病大慧云近來衲子不肯向省力處做工夫只管熱忙來呈見解作頌古雲門向他道不是者箇道理便道把定他不肯放過我且問你你還自放得過也未諸上座各人要知慙愧不要取笑識者山僧今夜與你點破若是得底人舉起便知絲來線去自然雅合你看龐居士訪松山和尚值山經行士問云手中底是什麼松山豎起拄杖云老僧年邁缺伊一步不得士云然雖如是壯力猶存他得底人相見自然恰好所謂滿口含冰不曾道著一箇水字不似如今人自己尚不知落處只管記得滿肚皮言句徒逞快利有什麼交涉雪竇謂之隨流失源你道他病在什麼處病在不以此為念祇圖好看若是真為道底人便是善知識肯了我自己不曾到大休歇田地亦自不肯大衆且看自己於聲色關頭逆順境緣一切時一切事果能一念不生麼心如木石麼如人飲水冷暖自知不可自瞞即瞞得亦終不干別人事我方才舉斷除煩惱重增病且道煩惱為在內為在外為在中間若求煩惱不可得更欲去除他豈不多了一翻手腳趨向真如亦是邪真如作麼生面目汝擬作麼生趨向他諸上座汝才擬即不是了也者箇田地從無始來至於今日更由今日盡未來際還曾動著也無何不直下悟去更自直捷喫許多辛苦作麼問答僧問現前且道承誰恩力師云上座也解恁麼問進云建化門庭且置未萌以前道將一句來師云即今是什麼進云兔角杖子為什麼能穿電影師云大慈悲菩薩僧問倩女離魂那個是真底師云大衆看者僧也解恁麼問僧問大事未明時如何師云一二三明後如何師云四五六靈泌問蓮華未出水時如何師云巖下煮茶燒樹葉出水後如何師云㵎邊流水散桃花僧問某甲參學以來苦無見處師云你要見作麼進云也須有個真實見處師云幸自可憐生僧罔措師坐次僧問無我之旨畢僧復問祇者能無我者是什麼師云有病眚者請醫治眚眚愈醫云你眚已去了是什麼僧無對師坐次指銅鍋問僧有人問你是什麼作麼生對僧云銅鍋師云還有疑麼僧云不疑師復問一僧僧不對師以手指云你肚裏有禪僧問如何是賓中賓師云業識茫茫無本據可憐白日喪天真如何是賓中主師云途中解作活無往而不利如何是主中賓師云慈悲巧妙施方便善握司南驗正邪如何是主中主師云佛祖潛踪蒼生絶跡進云佛祖潛踪蒼生絶跡時如何師不答僧禮拜麗中是問理則頓悟事以漸除理亦有漸悟底麼師云有事亦有頓除底麼師云有復云理若無漸悟則佛與衆生不由緣起事若無頓除則一切法皆有根本又問悟之一字亦不立敢問未悟不立悟了不立師云月是禮拜僧問師是那一宗師云饑來喫飯困來眠僧無語師云你道是那一宗僧云不知師便打僧云莫是臨濟宗麼師云你却伶俐態心開總理問諸經俱云無我為甚涅槃獨云有我師云如醫病人先用大黃消其邪熱後用人參補其元氣楊未了司馬問弟子戒殺已久邇來專事持誦得麼師云者是功行邊事若本分上未了總是業識茫茫進云如何是本分事師云古人道乾坤之內宇宙之間中有一寶祕在形山居士還識得麼進云不識師云何不向不識處看士罔措進云居常多坐不覺每遇不如意事便打不過不知病根所在師云功德天黑暗女有智主人二俱不受還有什麼打不過處良久復云若未能直下便了且就世情上勘破祇如居士年遇六旬從前涉歷且道即今在什麼處豈但六旬再過六劫也只如此幻妄空花徒勞把捉者裏勘得破放得下日久歲深父母未生前一著子自然觸著磕著進云側聞至論毛骨悚然不知要見未生前一著子如何下手師云者便是下手士禮拜嚴舂陵司李問弟子職司刑罰民命攸關何以令彼無隱情此無枉法師云只從自己根源上討個分曉自然把柄在手生生殺殺無非妙用進云敢問某甲自己根源分曉所在師云山僧若說是山僧底進云某甲嚮道已久無奈種種情念終難排遣師云此未是根源話然試問居士假如夢中覺夢還是夢麼進云畢竟是夢師云醒來夢中心境還用排遣麼進云不用排遣師云根源上明了亦復如是一切情念不除自盡進云情念盡時豈非空無所有師云若無所有又成斷滅去也就者裏體驗看金叔起居士以解易自負每舉一陰一陽之謂道師云汝所論陰陽口頭道理耳却拈不出來起云師能拈出試拈出看師云生死大事汝還知麼起云不知師云一陰生汝不知生死還求知麼起云求知師云一陽生法字卍請益格致之旨且述陽明頌語以質師云此事不與教乘合況儒典耶雖然孔子手眼也不小渠開口道個在明明德明德是什麼爛柴頭學者向什麼處撈摸陽明揭出良知亦非世見可到但云無善無惡心之體我不如是卍云師意如何師云不可思議心之體有善有惡意之動何不云一念動處即為意知善知惡是良知說他不是良知亦不得卍云師又如何師云知而無知是良知為善去惡是格物我與你另拈出物而無物是格物僧問閻羅王還有也無師云子甚處來云杭州來師云會麼云不會師云莫道無閻羅王喫鐵丸有你分在蔡雲怡督學問日坐金輪峯還望見漢陽峯頂否師作此相答之又問踏上匡山有三條大路畢竟那一條是大路師云咦者一條是大路又問廬岑險峻高出羣峯為什麼羣峯讓他獨出師云爭怪得伊又問身在山中身在山外且置祇如粗頑者土皮壘塊者石骨凹凸者峯巒參差者林木奔飛而下墜者瀑布靉靆而上升者雲烟怎見得廬山真面目師云土皮石骨峯巒草木瀑布雲烟又問有人在金輪峯頂有人在彭蠡湖中忽遇波浪滔天石觸舟沈峯上人作何救他舟中人作何自救師云南無觀世音菩薩師與蔡督學話次驀指瓶中花問云一種花為什麼有二種色蔡云根無二種師不肯蔡云師意如何師云一種花二種色靈泌問如何是但願空諸所有師云出門不踏芳草路如何是慎勿實諸所無師云歸家不坐涅槃牀又問如何是賓中賓師云家貧猶自可路貧愁殺人如何是賓中主師云久旱逢甘雨他鄉遇故知如何是主中賓師云一朝權在手便把令來行如何是主中主師云八千子弟今何在更無面目見江東又問香嚴上樹意旨如何師云霧卷烟收後森羅宇宙寬法樹蔭問香嚴上樹意旨如何師云鯨吞海水盡露出珊瑚枝又問如何是你有拄杖子我與你拄杖子師云鳥棲無影樹如何是你無拄杖子我奪却你拄杖子師云花發不萌枝又問南泉斬貓意旨如何師云你一切時中拈匙把筯又作麼生又問萬法歸一一歸何處師云來說是非者便是是非人僧問南泉斬猫還有罪過也無師云兔角杖挑潭底月龜毛繩縛嶺頭風僧問如何是第一玄師云如人飲水冷暖自知如何是第二玄師云上座是如何是第三玄師云東去也是上座西去也是上座如何是第一要師云更無玄與妙如何是第二要師云信手拈來草如何是第三要師云是處有芳草僧問香嚴上樹話意作麼生師云蒼天蒼天僧問蚯蚓斷為兩頭兩頭俱動未審佛性在那一頭師云兩頭俱動師舉雲門三頓棒因緣問法字卍云雲門恁麼問洞山恁麼答為什麼放他三頓棒卍不契一日師復舉前問卍忽省云百姓日用而不知師云不知個什麼卍云查渡湖南報慈師休去師問卍你有拄杖子我與你拄杖子意旨如何卍云恁麼娑婆訶你無拄杖子我奪却你拄杖子意旨如何卍云不恁麼娑婆訶師問卍如何是奪人不奪境卍云鄱陽湖裏絶行蹤如何是奪境不奪人卍云與師共坐千峯暗如何是人境兩俱奪卍云雨暗廬山深閉門如何是人境俱不奪卍云大家啜茗月明中僧問某甲祇是一個不識結在者裏師云但向者不識處會取僧問某甲如今此心極是安樂莫便是麼師云是誰安樂僧罔措師問法字卍如鏡鑄像像成後鏡向什麼處去卍云也跳不出僧問惟此一事實餘二即非真時如何師云禮拜著僧禮拜起師云餘二即非真僧復舉楞嚴云山河大地語未畢師震聲一喝僧罔措僧求開示師云你一向作什麼來進云某甲一向行行不知行什麼行今日遠來望和尚慈悲指示師云你謙退作麼進云某甲實實不曉得師云不曉得豈不是大了當人進云某甲未到者田地師云你昨日從那裏來進云自東莞起身十二日到鹿角十四日到此師云那個同你來僧指傍僧云與他向來師震聲一喝僧罔措再求指示師云適來已徹底相為了也僧復求師云我從來不曾與鉢盂安柄師問僧你參什麼話頭僧云一口氣不來畢竟向什麼處去師云有人問你作麼生答僧以手彈桌子師云五蘊身田強作主宰僧無語師云且去喫茶僧禮拜起云某甲實有一語師云且去喫茶僧問寶劍未出匣時如何師云無人能見進云出後如何師云汝看他是何面目進云面目現在師便喝僧罔措僧問一切意旨即不問離一切意旨作麼生師瞪目視之僧擬進師便打師舉雲居膺示衆了無所有得無所圖言無所是行無所依心無所托令衆每句下語以驗一夏所造各呈畢麗中是首座云上四句且置只心無所托語未有近傍還請和尚著師云了無所有得無所圖言無所是行無所依遂張兩手云蒼天蒼天座作禮云某甲更有語在師云子作麼生座云切忌恁麼時師笑云子深得雲居之旨座便休居士問如來為栴檀相摩頂是一是二師云汝未開口時猶較些子進云莫是授記麼師云汝身上有獦蚤癢作麼主張僧問滄海任憑日月轉青山不逐四時凋如何是和尚無量壽師云闍黎問底是問九九八十一古人多指出如何是不落數量底壽師云大慈悲菩薩問大衆運為盡承恩力如何是普賢行門師云上座也解恁麼問問終日穿衣喫飯動轉施為如何是文殊境界師云滿眼滿耳問世間什麼物與恁麼人同年師云問取露柱僧問霧長空無遠近雪埋深徑絶高低如何得雪消霧散去師云人皆苦炎熱我愛夏日長問冬日則飲湯夏日則飲水如何得不違時失候去師云心不負人面無慚色問水向石邊流出冷風從花裏過來香如何得君臣道合去師云九九八十一問荊棘林中穿日影烟波水上皺雲霞如何是入廛垂手事師云你問我答居士問百丈野狐為什麼不落便墮不昧便脫師云打還他州土麥唱歌須是帝鄉人進云恁麼則脫者未曾脫墮者未曾墮師云又被風吹別調中進云只如黃檗一掌意作麼生師云啞子問聾人僧問如何是和尚家風師云饑來喫飯困來眠問師唱誰家曲宗風嗣阿誰師云達磨不來東土二祖不往西天問如何是學人行腳處師云著破草鞋赤腳走如何是學人一切時不起妄念處師云起也如何是學人親切處師云莫將問來問如何是學人不假悟處師云噁如何是超佛越祖之談師云一家有事百家忙如何是和尚親傳底事師云有問有答僧問離一切語言棒喝揚眉瞬目之外乞師直指師云汝自己道盡了僧罔措禮拜起立師云汝作麼生會進云不會師云不會更妙進云還有意旨也無師云又是頭角生僧問如何是前念不生即心師云鯨吞海水盡如何是後念不滅即佛師云露出珊瑚枝僧問大事未明如喪考妣大事已明如喪考妣如何是大事師拈起竹篦云老僧者個是竹篦子又問不是心不是佛不是物畢竟是個什麼師云汝自出供狀了也居士問文殊罔明女子是一是三師云兩彩一賽進云罔明又是那個師云女子又是那個乃云此定就瞿曇也出不得即今大地衆生亦不曾出此定也所以云一切衆生已成佛竟已度生竟已涅槃竟進云畢竟此中不了師云又是重添八字眉僧問破戒比丘為什麼不入地獄師云無孔鐵鎚清淨行者為什麼不生天堂師云石師子僧問如何是直截根源一句師豎起拂子良久云汝作麼生會進云見和尚作用師云甚處見得進云見和尚舉拂師云我未舉拂時汝作麼生會僧無語僧問千里聞風即不問海幢消息近如何師豎起拂子進云離了者個又作麼生師放下拂子僧禮拜師云汝作麼生會僧便喝師云好喝再喝看進云喝過久矣師云者是套子復問志公噉鴿未曾動著一條毛請問鴿子在什麼處安身立命師云今日新羅國說什麼事僧擬議師便打僧求開示師豎拂子云會麼云不會師云不會底汝還曉得麼僧展兩手師云者是學來底僧復問如何是覿面無私一句師云遲了也張月鹿黃堂庭二居士參張云某甲自廬山承教後漸覺不大為塵俗所纍每誦心經至心無礙深信不疑然不能當下撇脫畢竟自家放不下師云還是看今時不破若看得今時破爭有放不下底聻圓覺云妄認四大為自身相六塵緣影為自心相不知種種皆從緣生緣聚而生緣散而滅如夢如幻如泡如影即今山僧與居士在此談論也是偶合之緣也俱不可得張云明知一切皆從緣生還有不從緣生者麼師云且喜居士有此一問黃云不從緣生豈不是心師云心即緣生從朝至暮念起念滅豈不從緣張云除此緣生更於何處覓真實底師云無有一刻不承他恩力即此生滅俱從他起却覓他起處不得居士須實實用一番力體究始得張云每到此處便難用力師云本自露堂堂當下不自取轉求轉遠楞嚴云一切衆生生死相續皆由不知常住真心張云于今怎麼知得常住真心師云居士平時所謂仁義忠信一切道理是常住麼張云斯人存斯理存何嘗一刻不存師云恁麼畢竟理因人顯人且不存理於何附黃云誠知佛教一切歸空師云且道空歸何所傅大士云有物先天地無形本寂寥能為萬象主不逐四時凋是空不空是常住不是常住張云某甲雖不知常住真心但自驗頗有得力處祇是無求二字世人事事罣礙皆因有求若能無求有何罣礙師云若要徹底無求也須徹底看得破譬如燈光焰焰相續愚者將謂燈光常住不知後焰已非前𦦨又如流水刻刻不停愚者見水謂水常住又如一城人物往來一年如是百年如是寧知死者死生者生人物依然却非其故又如一人今日之身已非昨日佛云才生即有滅不為愚者說者裏爭容得汝攀援執戀爭容得汝思量分別如今却把取不得底死捨不得又爭得張辭求一言可終身行者師云諸惡莫作衆善奉行張云願求進步師云當淨其意隨舉華嚴偈云若人欲識佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙張云淨意豈不是不生不滅境界黃云還有工夫在麼師云不省得時向者裏體究便是工夫黃云某甲於今凡遇事來物來隨時應付過去便不留蹤跡何如師云者境界也大難黃復舉似首座座云要到者田地先須識心始得著語翠巖真見慈明慈明問如何是佛法大意著云探竿影草真曰無雲生嶺上有月落波心著云小盡二十九大盡三十日明曰頭白齒黃猶作恁麼見解著云賊真涕泗交流不敢擡頭著云被人換却眼睛了也進曰畢竟如何著云獅子咬人韓盧逐塊明曰無雲生嶺上有月落波心著云畢竟出他鬼窟裏不得真言下大徹著云又被人換却眼睛了也永嘉覺參六祖繞三匝振錫而立著云千里特來呈舊面祖曰夫沙門者具三千威儀八萬細行大德自何方來生大我慢著云人以語探水以杖探進曰生死事大無常迅速著云把髻投衙祖曰何不體取無生了無速乎著云來也來也曰體即無生了本無速著云果然果然祖曰如是如是著云未可信在須臾告辭著云掉得便行有何不可祖曰返太速乎著云再三撈摝看曰本自非動豈有速耶著云依舊孟春猶寒祖曰誰知非動著云深入虎穴曰仁者自生分別著云真師子兒祖曰汝甚得無生之意著云懸崖一推曰無生豈有意耶著云好個翻筋斗祖曰無意誰當分別著云前箭猶輕後箭深曰分別亦非意著云大冶精金應無變色祖歎曰善哉善哉少留一宿著云平交平交洞山價祖偈切忌從他覓著云才生便咬自然無事迢迢與我疏著云錯我今獨自往著云巍巍堂堂處處得逢渠著云淫坊酒肆逢彌勒渠今正是我著云老老大大作恁麼語話我今不是渠著云救得一半應須恁麼會著云面皮厚多少方得契如如著云一坑埋却音釋眚所景切生上聲目病生翳也蠡里弟切音禮彭蠡澤名皺側救切音皺布也纖也聚文也
