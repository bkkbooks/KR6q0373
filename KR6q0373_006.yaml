body:
  text: 丹霞法孫今釋重編書問與子木方伯昔有僧參雪峯峯問什麼處來僧云覆船峯云生死海未渡為什麼覆却船僧無語遂回覆船舉前話覆船云何不道渠無生死其僧回雪峯如教而答雪峯云須是覆船始得山僧云渠無生死豈有第二人今人從朝至暮見聞覺知一一天真一一明妙才落意根便千差萬別居士若要易會祇在日用處勿動意根冷冷地窺看極是省力至囑答黃龍卷居士承謂今人不如古人未嘗不是然須自己徹悟一回腳踏實地是與不是自然無疑若心外見有毫𨤲法可得便非徹悟矣所以見有能信之心所信之法尚未入信門真到無心時佛見法見尚不現前況世間塵勞煩惱耶若論實際理地三世諸佛歷代祖師天下善知識同一鼻孔若論品位修證則千差萬別經云一切賢聖皆以無為法而有差別豈不聞迦葉三昧阿難不知阿難三昧商那和修不知商那和修三昧優波掬多不知耶仰山云如今祇要明得自家性海如實而修聖邊事且莫將心凑泊他時後日自具去在好不明明直說如公所云古人會得即心是佛時一時全具五眼六通且道從上諸祖幾個全具若以無通為非則外道天魔通亦不少何得以此為邪正之權衡自落異見溈山云得底人他自知時修與不修是兩頭語若有從前習氣未能頓盡直須教渠淨除現業流識所以悟後之人自解作活計謂悟後習氣依然則所悟者何物也承問救療方便我道別人著力不得其中絡索面傾為快答周五溪太史有身則有病豈以無病為敵得生死乎若以無病為貴則長生久視之術足以傲雙林背痛矣涅槃云世有二種想一衆生顛倒想一世諦流布想一切衆生皆具二種想聖人祇有世諦流布想無顛倒想又云牛聖人亦喚作牛馬聖人亦喚作馬某年月日聖人亦喚作某年月日與常人同祇無顛倒想耳顛倒想是病四百四病非病也四大本空五陰非有佛與衆生同此一法故曰但除其病而不除法大慧杲患背瘡不住喊云痛殺人痛殺人大衆皆疑適一禪客至便問云還有不痛者麼大慧云有進云如何是不痛者大慧喊云痛殺人痛殺人禪客禮謝觀此則病苦呻吟禪宗作略未可輕議禪宗惟論見性直指即心是佛一心之外更無毫釐法可得若以如來知見治習氣則心外有法矣所以此門悟處深玄不與教合其有未悟只用無義味死貓頭單方絶妙祇恐不能死心全身裏許若全身裏許無有不得者時節若至其理自彰靈驗不靈驗不必問人矣答惟己禪人六祖大師云世人外迷著相內迷著空若能於相離相於空離空即是內外不迷本來真性而得出現夫言相者外塵境也空者內意根黑山鬼窟也經云縱滅一切見聞覺知內守幽閒猶為法塵分別影事何以故但有幽閒可守即是境與意根作對有意有境即屬生滅永嘉云心是根法是塵兩種猶如鏡上痕痕垢盡除光始現心法雙忘性即真所以但有取捨向背便是執著有執著便是迷也如今若要直捷祇是無事於心無心於事公謂凡遇有事時不論大小俱以付清淨本體不敢起一毫意念保個清淨本體豈不是意依然心境對待非真也以紛飛之心攝入清淨體中又成藞苴工夫不是者等做若直捷做去內心一毫不放出外境一毫不放入思之答林涵齊銓部普菴云揑不成團擘不開何須南嶽又天台六根門首無人識引得胡僧特地來你看六根門首無人識好不道破居士如今祇要識心屏息諸緣莫向外求內不放出外不放入者樣看去就是生擒活捉一般容易之極博山先師教人看一口氣不來向什麼處去正是教人直下認者個本來面目現前面目還認不得更說一口氣不來作什麼于今學人祇向一口氣不來處討所以愈求愈遠未審居士作麼理會若一時不會但向不思善不思惡處冷冷看去再不怕工夫差池再不怕用在情識上極是直指沒有一些蓋覆但二六時中心不異緣常要頓在面前自然露裸裸地迥脫真常忽然觸著便是大事了畢五泄見石頭問云一言相契即住不契即去石頭據坐五泄便去頭喚闍黎泄回首頭云從生至死祇是者個回頭轉腦作麼泄大悟你看他說個什麼渠又悟個什麼善知識但向學人四威儀中輕輕點他一下伶俐漢便當機領略也不潦草也不多說佛眼云人因心迷故來山林見善知識不知就你本人迷中最是親切極道得好圓悟云古人公案未必透得且識了心不要理他自己一個心拋開一邊却向善知識口邊討長討短書本上忖東忖西有何交涉且如何是自己底心心又如何識僧舉長沙偈學道之人不識真祇為從前認識神無量劫來生死本癡人喚作本來人問永明意作麼生永明云楞嚴會上甚是明白阿難云如來現今徵心所在而我以心推窮尋逐即能推者我將為心佛咄云此非汝心此是前塵虗妄相想惑汝真性此個便是識神諸佛諸祖指得極明我今重為居士道破總是者個意根起滅不停蓋覆真性遂成生死根本所以識真才得息妄非遏捺也四禪八定皆是用攀緣心去修所以出不得生死徹悟真空方免此患華嚴云一切法不生一切法不滅若能如是解諸佛常現前我與居士同在大覺海中也無生死可出也無法可說還信得及麼維摩云善來文殊師利不來相而來不見相而見文殊云如是居士若來矣更不來若去矣更不去所可見者更不可見山僧淺淺與公下個注腳維摩是無生緣起文殊是緣起無生一念無生外至山河大地內至六根六識俱不可得一落意根便生出許多枝節便見有境緣作對龐公云心空及第歸珍重復覩者禪人參話頭當知古人所以教人參話頭之意從上諸祖並無教人參話頭之說當時學人朴實時時刻刻以生死為念故一遇善知識一言半句便自開通後世學人雜念紛飛橫生知解教渠尋求自己便有許多計較或認昭昭靈靈或認空空寂寂種種卜度愈求愈遠祖師不得已示個話頭乃是直指出本心與人令人絶盡意識當下便了若不能了則向此中疑之又疑是之謂參須知參話頭即參自心疑話頭即疑自心非有二也如汝問我如何是某甲本心我即云喚作竹篦則觸不喚作竹篦則背不得有語不得無語我已明明直指個本心與汝也只是汝不曾自悟若不能悟便要向此中疑之又疑求個出身之路若稍生意識謂竹篦子話只是斷人意識或欲泯絶念頭令人念不起或認取不起光景或又去究起底源頭種種計較差之千里矣參話頭如人墮井求出相似時時刻刻單有出井一念繫之於懷更無別般計較汝今正要如是時時刻刻不忘疑情單單有個求出身之路繫胸臆間更不起一毫頭生活之念亦勿望人為汝指示如此做去不久決得徹悟惟禪勉之勉之雜著金剛正法眼序達磨大師秉單傳之旨謂二祖曰吾觀此土惟楞伽四卷可以印心至黃梅易為金剛勸一切人受持此經即得見性則知直指人心無過於此自曹溪以後如洞山聰黃龍南汾陽昭中峯本諸大宗師皆以此經為契證希有哉豈可謂文字乎吾子麗中宿植善根妙悟上乘諦觀此論一字一句皆般若之精髓也希有哉豈可謂今人異於古人乎或謂空隱老凍膿猶有鄉情在豫何敢私金剛正眼現在具眼者請鑑重刻擬寒山詩序佛言若要世間無刀兵除非衆生不食肉茲者三災並起人命危脆或募兵守城或遁逃山林或隱匿海島以自為計雖貪生怖死人之常情豈知定業有不可逃者蓋殺生之極感刀兵災偷盜之極感饑饉災淫邪之極感疾疫災非天降非地湧非人與皆衆生自業吸引因果相酬如影隨形如響應聲欲不受果惟不造因因亡則果喪業空則報亡耳道獨偶閲慈受禪師擬寒山詩見其詞語懇切深錐痛劄今人通病實對治之良劑玩味不已重梓流通伏冀諸賢詳審起大慈心悲愍衆生不食其肉齊戒清淨謹敕身心衆善奉行諸惡莫作一人依之一人不受業衆人依之衆人不受業斯即善身保家壽國之良圖也募誦華嚴經引福州萬歲寺諸經惟華嚴最尊乃如來根本法門一乘圓頓至教也一切二乘不聞此經佛惟付囑大心凡夫若能信入疾得阿耨多羅三藐三菩提至於禳災集福壽國保家其緒餘耳近者三災疊起人人驚懼或歸之於業以為無可逃者然業有二有定業有不定業定業難逃不定業則可釋也又障有三一曰煩惱二曰業三曰報煩惱可以理遣心地一明情念自息也業可以懺悔燒香散花竭誠禮佛改往修來則業自消也惟報難移必資大法方能回轉則無踰此經矣此經如清涼月能消熱惱如善見藥無病不除如如意珠能雨衆寶如天甘露能潤焦枯一言之下心地開通立地成佛一句染神永為道種聞而不信尚作遠因學而不成猶勝人天果報則受持讀誦書寫解說從可知矣退菴居士深明因果發大悲心行菩薩道結期於萬壽禪寺請僧轉讀願與一切有情同種善根共入毗盧性海伏冀見聞隨喜共成勝因一念尊重恭敬無論淺深久暫同乘佛乘直至道場決不唐捐幸勿蹉過又長慶寺一皮較一皮孫子不如兒坐禪勝誦經誦經勝有為古人恁麼道也是掉棒打月接竹點天總不親切我道有一人不誦經亦不坐禪還識得此人否若識得此人則粗言及細語皆歸第一義何必大家團聚相對喃喃也雖然求恁麼人如星中揀月且向第二門按下雲頭教伊循行讀句忽然心地開通義天朗耀不妨亦得搆去經云譬如暗中寶無燈不能見佛法無人說雖慧莫能了又云以佛智慧燈照見所行道是則誦經良有益矣西禪監院某題誦華嚴尊經統冀衆檀共成勝果如理如事祇在各人分上正是一舉一回新耳修大悲懺法引法海寺法華云若人有福曾供養佛六度之中檀度為首賢劫千佛名經無一佛不於往昔因地中或然燈或燒香或散花或施幢幡寶蓋無量無邊然後成佛經又云乃至以一花致敬畫像或復舉一指及小低頭以此供養皆成佛道然則人無聖凡事無大小其必以福德莊嚴報土必矣傅大士以彌勒化身日則躬耕夜則行道而況此際三災鼎沸生死須臾何不捨不堅之財修堅固之福遠播成佛之因近脫目前之業至善舉也聖光上座欲建大悲懺三年道場所費浩繁仰仗衆力若云淨智妙圓體自空寂如是功德不以世求又作麼生我道已上供通並是詣實化齊糧引長慶寺金剛經云爾時世尊著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷坐而坐看來何等省事上古修道之士巖居穴處草衣木食不為口體所纍百丈立叢林纍從此起山僧曾於匡廬羅浮開者鋪席甚覺多事擬休歇去卸却擔子入閩所以三四年間不定踪跡昨歲偶到長慶禮塔見僧衆四散殿宇荒蕪心甚惻然因𢹂數子入寺就廊廡間煨一小鐺棲遲永日不期撫臺懷東陳居士興復祖庭際此因緣欲辭不可修造伊始日給未遑饒是鐵面禪和也須裹腹若云道不及古何不省事好山僧只得忍氣吞聲高明大士幸亮我也重鑄開元寺鐘引寶志公示化蕭梁以神通力現幽途苦相武帝問以方便志公曰若聞鐘聲斯苦暫息於是天下寺無不置鐘付法藏云罽賓王好殺報千頭魚身劍輪繞之隨斫便生有阿羅漢充維那依時打鐘魚聞其聲劍輪脫落其餘神驗援據難盡然鐘之功德非但拔苦消災尤為入道要徑楞嚴云此方真教體清淨在音聞欲取三摩提實從聞中入所以從文殊門入者一切山河大地助汝發機從普賢門入者一切運為俯仰助汝發機從觀音門入者一切聲響音韻助汝發機溈山有一僧鋤地次聞鼓聲呵呵大笑溈山曰俊哉此是觀音入理之門諸仁者尋常盡道西方水鳥樹林皆演法音舍此欣彼當面錯過豈非心有高下不依佛慧耶開元寺鐘宋天聖間信士林陶募五萬餘人得銅萬五千斤所鑄紹聖劫運音聲不振合郡比丘捐衣鉢重鑄茲丁亥兵燹尤慘諸宰官居士爰有今日之舉豫喜開元興復且將緣起於此也不禁一言開元寺在芝山上全閩靈秀所鍾十方長者諸山長老大家出手均非分外他時月朗風清萬籟潛消聲聲聒耳我道觀世音菩薩來也莫說獨道人饒舌好華嚴寶鏡序李長者華嚴論一乘圓頓見性成佛之祕典也諸佛根本不動智即是衆生分別性誠無轉摺祇要當人信得及若信至滿處即入十住初心明見佛性成等正覺所以云才入信門便登祖位或有從來習氣不過以無作三昧方便應之於此真智之外非別有毫頭法增入亦不論修與不修亦無成正覺者蓋一切衆生已成佛竟已度生竟已涅槃竟何以故十方諸佛與大地衆生情與無情一切諸法同此法界性故無今古自他之相及成與不成直下信得及當體便是捨此別求終無得理經云若不見真智纍劫修行不成道果名假名菩薩若見真智即生如來家為法王真子希有哉道獨不知何劫熏得此心直信無疑一覽此論痛哭流涕以為千生罕遇而今得遇萬劫難逢而今得逢復自踴躍慶幸無已丙申秋駐錫海幢再覽斯論心意怡然不忍釋卷覺年垂耳順耳目不利論文浩繁難於常閲遂於論內搜括精義聯為一篇目曰華嚴寶鏡寶鏡者法界真智也此智為萬法之體法界依之而建立又能洞照萬法故號為鏡也中間一字一句皆是論主心光道獨不敢臆見亦述而不作云爾重刻十明論序通玄長者未造華嚴論先造此十明論乃華嚴論之關鑰也蓋十二有支乃一切衆生輪回生死苦海即是毗盧遮那法性海也衆生苦海與法性海元無實性一念迷即生死苦海一念悟即法性海其體無二祇由迷悟而得名所以云法無定相惟心轉變耳古佛智海迷在無明全在當人以方便三昧力顯之言方便三昧者定慧之異稱也法華云如來所得法定慧力莊嚴以此度衆生自成無上道捨定慧而別求方便則吾未知也今去聖時遙人多懈怠口耳之徒習以成風隨流失源迷而不返良可痛愍故重刻此論與同志者醒目設若反本知源亦有補矣或云此是教乘宗門別有長處則道獨自甘負墮也心經直說總說般若波羅蜜多心經乃大部般若經之樞要成佛真宗無逾此矣言心者指衆生妙明心體心即佛佛即心般若乃心之智心是體智是用然體本具智慧之用不為境緣所奪聲色所縛故云到彼岸心即法身智即般若彼岸即解脫此三德一心本具法身不癡即般若般若無著即解脫解脫寂滅即法身觀自在菩薩行深般若波羅蜜多時照見五蘊皆空度一切苦厄正此意也言色空者色無自性全體是空空無自性全體是色一蘊既空四蘊亦然蓋五蘊該盡世間一切萬法是以云是諸法空相諸法空相非斷滅空乃般若真空真空智中無五蘊十二處十八界生滅法可得亦無十二因緣流轉還滅可得無四諦苦集滅道可得亦無增減智得可得經云以無所得故正是諸法空相無生法忍華嚴云菩薩成就此忍時佛心涅槃心菩提心尚不現起何況世間塵勞之心耶若人一念與般若空慧相應時能滅殑伽沙劫重罪蕭然獨脫不為報緣所縛遠離微細心念念即常住得見佛性名為涅槃非但菩薩即三世如來亦依此般若空慧而成無上正等正覺故知般若有大威神具大光明最尊最上無與等者顯密總持是大陀羅尼門也龐居士云心依真智理逐心行理智無礙心亦無生迷即有我悟即無情通達大智諸法不成又云依空默用即是行深無有少法觸目平任無戒可持無垢可淨洞達虗心法無壽命若能如是圓通究竟希有哉般若真智其斯之謂歟靈泌潤公頌古序靈泌潤吾胞弟也童稚便有出塵志豫幼即入道以老母托之得無內顧憂蓋至孝至信人也比戊辰母卒遂於靈前落䰂相將行腳豫庚午掩關金輪弟苦參滋劇誓期妙悟一日偶與二三子舉風幡話豁然有省自此日夜披尋古德機緣深入玄奧雖極淆訛皆能透脫癸酉豫遷黃巖執侍關中春雨蒸濕豫與弟皆大病尋至海陽就醫而弟已不可起矣臨終之際蕭然獨脫同學問云如今作得主麼答云我祇是一身疼痛復如前問亦如前答即端坐而逝簡囊中惟頌古三十九首平時得意自著人無知者觀其向上透徹處實從胸襟流出惜限於年未能報佛祖恩耳弟沈靜寡言不露其所得人遇之如不慧豫戊寅度嶺以示首座麗中麗中視若固然詢之則黃巖時麗中已見且相得若水乳恆聞其以谷泉普化自命云噫嘻末法將來如吾弟豈可多得復念衲子中有真能致力於此道者潛符密證不克永年不能出世湮沒而無聞當不少矣遂序而傳之長慶老和尚行狀嗣法門人函是述師諱道獨號宗寶別號空隱博山無異禪師法嗣南海陸氏子生三歲母𢹂登樓覩蜘蛛結網瞪目久之悲喜交至後嘗語人曰我四五十年回憶不加毫末信知師宿根也六歲失父隨母居近寺晨趨禮佛仰視輒移午聞梵唄音過耳成誦從老僧知見性成佛語益切嚮慕逢人輒問人多戲之無沮色得六祖壇經不識字懷襟袖間懇禮大士一夕拜下困極倒地忽覺起如在空中汗出浹背輕快踰常張燈出經讀之意某字詢之人果然遂數行俱下自是始辭母入寺依離念法每坐達旦年十四習定樹下忽胸中如劈竹信口成偈云兀兀圓明體騰騰物我如此是無生路無生更要離又云善惡不思處亦不可追尋休言云是道是道是非生讀語録至石壓笋斜出崖懸花倒生復礙胸臆偶山行舉目巖花大放始豁然冰釋師是歲才十六依止菴僧無可意者自𢹂刀就磐石禮十方佛剃落縛茅歸龍山單丁十餘年事母至孝母病須山泉日肩擔走二十里及城閫始辨掌紋母卒廬墓三月乃以二十九歲入博山先有傳師行實至博山者山異之凡見僧必問曰宗寶何不來此道不到博山得麼至是聞師至即呼入方丈與語竟夕一日以倒騎牛入佛殿話命衆下語師有頌呈曰貪程不覺曉愈求愈轉渺相逢正是渠才是猶顛倒蟻子牽大磨石人撫掌笑別是活生機不落宮商調一衆環覩山曰太粗生師云大了當人向善知識前作麼開口山笑視良久云何消說師禮拜山始與易名登具足戒一住九越月辭去山不許師住山意決再三懇辭山乃訂八月再至師胡跪牀下曰某有不是請和尚勿放過山連聲曰是是汝他時不得辜負山僧此崇禎庚午四月也山竟以是年九月示寂始悟八月再至之語師時掩關金輪復徙黃巖為金內翰正希陳督學雲怡熊督師心開諸公所重嘗造室問道請說法師一意巖隈無出世志逮瀛山雪公歿孝廉張莂公黎美周謀諸內閣象岡何公宗伯秋濤陳公力請師住羅浮開博山法門博山道法不絶如縷賴師振起師退處如弗勝真朴之風絶去時習而悲願沁人略無同異自節烈文章之士以至販夫竈婦無不醉心咸願出門下閩人聞其風以雁湖小剎致師師亦欣然航海而就至則雁湖為賊煨燼師寓南臺得山林公克之方公孔碩林公一見心折與闔郡諸大老請主西禪撫臺佟公為新之一時道風遍洽戶屨常滿師頗厭勞因掃塔博山杖䇿還抵芥菴作投間計頃惠陽紳士請說法豐湖又廣州王臣景慕往返海幢幢幡所指俄成寶坊師慨然曰將圖息機反致疲纍矣順治十七年二月忽示瘡疾猶接納無虗日明年四月自海幢還芥菴始謝參請七月初七日初夜詔函是曰瘡患延綿殊可厭惡吾旦夕且掉臂矣是泣懇曰乞師住世群生可念師曰吾道有汝重擔可卸復何戀耶二十二日晨起啖粥嚼木如平時侍者請敷藥師遽曰今日不敷藥顧左右斂目良久端坐而逝壽六十二坐夏三十又三全身塔於羅浮華首臺西溪之南師生平以道自守以悲攝人遇物純真不事聲譽大小淺深各隨所受凡示誨皆明達曉人稍有所裨必喜見眉宇有乞偈頌隨口命記欲易字句亦笑從之人有進曰道法所關和尚何得輕易師正色曰壇經云彼善知識有大因緣所謂化度人根利鈍不可類齊但具至誠豈可辜負至宗門大法中下難窺老僧自有權衡豈若輩所知耶故師開法二十餘年所蒙椎拂記莂自函是函可而外未嘗濫授示疾以來一年有奇日用巨細纖介靡遺獨於臨終告衆遺囑諸事絶口不道博山三十年縝密家風師真無愧矣示寂之日內外弟子咸悲慟彌月與大覺雙林一會哀震梵天同一悲仰其慈光入物真非思議所至若道法深穩易見難知諸録流通海內聞見非函是所應言也長慶空隱獨和尚塔銘禮部尚書虞山錢謙益撰博山無異禪師有法嗣曰長慶空隱和尚諱道獨初字宗寶南海陸氏子也生三歲母抱登樓觀蜘蛛結網瞪目久之悲喜不禁晚自言四五十年來回憶不加毫末其夙根如此六歲失父隨母居近寺晨趨禮佛瞻視輒移午聞老僧言見性成佛遂發深信如釘入木得六祖壇經捧持頂戴禮大士求識字疲困倒地忽覺身騰空中汗透毛孔明燈讀經倣佛認是某字詢之人果然遂數行俱下年十四辭母入寺習定樹下胸次忽如劈竹衝口說偈驚動其長老年十六自磨刀就磐石上禮拜剃落縛茅歸龍山單丁十餘年母病渴晨擔山泉走二十里抵城闉始辨掌紋年二十九母歿與其弟靈泌腰包謁博山山一見曰宗寶望汝來久矣拈倒騎牛入佛殿話勘衆下語皆不契師呈頌曰貪程不覺曉愈求愈轉渺相逢正是渠才是猶顛倒蟻子牽大磨石人撫掌笑別是活生機不落宮商調山微笑云太粗生是夕布薩告衆莫道博山無人如今也有箇許為更名登具足戒住九月而別囑曰汝八月再至不得辜負老僧是年九月山示寂始知為末後付囑也師掩關金輪徙黃巖一意住山無出世念中宰官請住羅浮開博山法門幡然起應慈悲普熏機緣冥應而世變大作矣閩人以雁湖延師復請住西禪海波觸搏弓刀擊戞所至有吉雲擁護甲午歲掃博山塔杖錫還豐湖羊城頻受參請牀座禮足道路布髮津梁稍疲微示瘡疾辛丑四月由海幢返芥菴自尅去期七月二十二日端坐而逝世壽六十二坐夏三十有三師有二大弟子曰天然是公祖心可公可公以弘法罹難坐脫瀋陽之千山師哭之慟曰吾道喪矣踰年師示疾是公啓請住世師笑曰汝在吾何死於是是公奉師全身塔於羅浮華首臺西溪之南手次行狀遣侍者今覞間關五千里撰書幣而謁銘於余余惟師上根利智多生熏習見性成佛四字直是胎藏鈎鎖即心即佛守定牢關非心非佛斷為增語於是乎全提正令曲指悟門遮表二詮則格量永明法界一心則懸鏡棗柏從無一言落夾片語過頭如今人執癡符家懷僞契販如來法訶佛祖禪藥病相沿狂易莫反標此正印柱彼倒瀾豈非般若之神符金剛之寶劍歟師之深心密行世所未悉者有二昔者大慧言吾雖方外忠君愛國之心與忠義士大夫等洪覺範論鹿門燈公則曰孝於事師忠於事佛此洞上宗風也師悲智堅密罏鞴弘廣植菩提之深根茂忠孝之芽葉節烈文章之士賴以成就正骨祓濯命根白霓碧血長留佛種條衣應器同歸法王此則其內閟外現陰翊法運者也古人道眼分明師資鄭重榮名利養畏如霜雹有謂深山裏钁頭邊撈摸一人兩人為接續者有謂架大屋養閒漢所居世界莊嚴為癡漢者師每道博山語我過後二十年宗風掃地土地廟裏也上堂了不圖親見此語良為流涕餐風味道英特如雲親承記莂兩人而已人謂師嚴冷孤峭不走博山一線豈知其悲愍末法如救頭然凜自宗之周阹立他家之榜樣有不勝涕淚悲泣者歟此則其重規疊矩謹衛法城者也往余訪憨山大師遺集致書海幢師歡喜贊歎披衣焚香犍椎以告衆病中見心經箋大師轉生辨重加印可是公以余霑被法乳亦菰蘆中幅巾弟子也故屬之以銘其何敢辭銘曰毗嵐風吹壞劫初崑岡火炎扇洪罏有大比丘建法旟一單坐斷嶺海隅心月普照身雲舒如摩竭龍雨焦枯分身蜿蜒鱗𩮻俱矯首蟠尾南北殊大雲如空覆匡廬智電擊爍醫巫閭中央不動常安居頷下自護摩尼珠黃皮裹骨山澤癯緇素旃貉魚貫趨日月耳環徒縈紆刀輪劍葉嗟騶虞樹下三諍今回車鶴林變白只須蕭然一榻結雙趺揮手長揖腥穢區法幢傾摧法將徂葛藤博飯皆沽屠鳥空鼠即胡為乎即心即佛心印孤宿將嚴警持兵符佛祖齊證誰敢誣魔外竄匿同即且丹青樓閣煥毗盧法座圍繞青蓮敷孤峯獨宿我自如隨身兩膝無剩餘龍象蹴踏看二駒瓣香迥向恩不辜我作斯銘三歎吁博山家風斯世無塗青鉛墨老筆疏逝挽頺波作世模剎竿倒却須人扶後五百年期不渝音釋藞苴上呂下切音崎下千餘切音蛆草枯不芳貌燹息淺切音鮮野火也縝止忍切音軫緻也縝密以栗癯求於切音渠瘠也山澤間形容甚癯覞昌召切超去聲
