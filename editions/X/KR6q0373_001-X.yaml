body:
  text: 丹霞法孫今釋重編上堂拈香云者一瓣香雖本自天然不從他得然畢竟有箇緣起爇向爐中奉為江西廣信府博山先師無異大和尚用酬法乳之恩斂衣就座僧問華首重開復覩拈花微笑法筵始建諦觀大法全提空劫以前即不問即今天下太平百僚奉職為什麼主心未慰師云仁者說底太親切進云從來有道之世堂簾深遠百姓不知畢竟教什麼人安享豐亨師云無面目漢進云恁麼則無絃琴無聲曲不犯手口今日人天眾前請師高彈一過師云闍黎深諳來風僧掩耳歸眾僧問智藥三藏當年於此有五百菩薩乞戒隱而不現即不問即今智藥在什麼處師敲案云來也來也僧回身指大眾云智藥法筵宛然未散師云承闍黎讚揚且退三步僧禮拜師便喝復顧眾云還有問話者麼僧出纔禮拜師便喝僧再拜師復喝僧又拜師云大眾看者僧還不知羞進云達磨西來如何是經師云者野干鳴乃豎拂子云昔日靈山會上世尊拈花百萬人天中惟迦葉破顏微笑世尊云吾有正法眼藏涅槃妙心付囑摩訶迦葉今日華首開堂豎拂大眾儼然且道是同是別諸上座者裏具得一隻眼不妨省力更莫遲疑莫入意根裏計較卜度縱饒卜度得成計較得就與本分事愈相懸遠諸上座明明白白一件事為什麼特地難將去汝若一念回光放下許多伎倆一點事也無只為汝無量劫來違背自己馳逐聲色方便教汝回光達本汝又不解却坐在鬼窟裏認箇無見無聞空空洞洞底是以六祖大師云世人外迷著相內迷著空若能於相離相於空離空即是內外不迷本來真性而得出現諸上座汝但外不著聲色名言句義內不存能所知見自然露躶躶盡十方世界無一塵一法不承此威光顯現還費多少力會麼會得是汝不會得也是汝東去也是汝西去也是汝既是汝管他會不會不見玄沙道汝等諸人如在大洋海裏沒頭沒腦還更伸手問人討水喫山僧恁麼舉揚事不獲已不過要諸上座回光達本若在通人分上總沒恁麼說大眾還會麼卓拄杖云還鄉盡是兒孫事祖父從來不出門珍重副寺圅記葬父請上堂僧問臨濟道第一句薦得與佛祖為師第二句薦得與人天為師第三句薦得自救不了伏乞和尚慈悲垂示師云從頭問來進云如何是第一句師云無佛無祖進云恁麼則光中垂手去也師云從何處得者消息來進云覿面相呈不隔絲師云猶是閒言語進云黃龍開口笑雲頂玉雞啼師云昨日有人道過了僧禮拜起喝一喝師云好一喝進云貧窮生孝子富貴出嬌兒師云且放下斬新條令道將一句來進云金牛昨夜遭塗炭悞殺耕夫失路程師云且退乃豎拂子云我宗無語句亦無一法與人教山僧作麼開口諸上座既是我宗無語句華首今日上堂說箇什麼既無一法與人諸上座向華首覓箇什麼諸上座此是徹頭相為莫要錯過了自己脚跟下只管踏步向前從他覓古人道覓亦不得得亦不真即今山僧說底便是諸上座聽底諸上座聽底便是山僧說底山僧說底外沒有諸人聽底諸人聽底外沒有山僧說底會麼舉藥山問石頭三乘十二分教某甲麤知嘗聞南方直指人心見性成佛實未能了頭云恁麼也不得不恁麼也不得恁麼不恁麼總不得子作麼生藥山罔措頭云子因緣不在者裏見馬大師去藥山見馬祖述前因緣祖云我有時教伊揚眉瞬目有時不教伊揚眉瞬目有時揚眉瞬目者是有時揚眉瞬目者不是子作麼生山便禮拜祖云見箇什麼道理便禮拜山云某甲在石頭處如蚊子上鐵牛師云者是直指人心見性成佛底榜樣者裏有殺有活有縱有奪我宗須是具者手段方纔為得人山僧今日為汝諸人注破恁麼也不得不恁麼也不得恁麼不恁麼總不得甕裏何曾走却鼈我有時教伊揚眉瞬目有時不教伊揚眉瞬目有時揚眉瞬目者是有時揚眉瞬目者不是海𤄃從魚躍天空任鳥飛大眾會麼復舉七賢女遊屍陀林一女云屍在者裏人在什麼處一女云作麼作麼七女同時悟無生忍師云記副寺持其父鏡宗良上座靈骨入羅浮建塔請山僧上堂與大眾結般若緣資其冥福忽有人問良上座骨在者裏人在什麼處山僧又作麼生良久云明日清明節大眾珍重生日請上堂僧問塵點劫前即不問如何是現前無量壽師云兩眼對兩眼進云世尊未離兜率已降王宮未出母胎度人已畢即今華首還存度人消息麼師舉拂子進云雞唱峯頭月魚躍海中天師云有勞繁用僧問和尚今日好日子惟願生涯一錢為本萬錢為利師良久云會麼進云本少人無見利多滿大千師云且放過一著乃云諸上座空劫以前事作麼生即今事作麼生南泉云空劫以前無佛名無眾生名恁麼時正是道祇是無人覺知王老師可謂體道者也若是華首即不然即今世界建立生佛分也心境紛然聲色交參與空劫以前不別諸上座還信得及麼若信得及直下無一絲毫頭事各人本來祖翁田地直下無一絲毫可得祇要要直下知歸擬心即差不擬心一一天真一一明玅波羅提尊者云在胎為身處世為人在眼曰見在耳曰聞在鼻辨香在口談論在手執捉在足運奔徧現俱該法界收攝在一微塵識者知是佛性不識喚作精魂華首又不然識者喚作精魂不識却是佛性且道還有優劣麼具眼者辨看如或未能更看風旛因緣六祖當時到法性寺聞二僧爭論一曰風動一曰旛動祖從旁忍俊不禁特地向伊道不是風動不是旛動仁者心動諸上座汝若會得便直下見六祖安身處便直下見釋迦老子安身處便直下見自己安身處透頂透底更無餘法古人有現成四句美如西子離金闕嬌似楊妃下玉樓日日與君花下醉更嫌何處不風流山僧拈來為諸人下箇註脚不是風動不是旛動美如西子離金闕嬌似楊妃下玉樓仁者心動日日與君花下醉更嫌何處不風流以拂子擊案下座浴佛日上堂僧問空劫前四月八現前四月八是同是別師云羅浮山進云世尊初生一手指天一手指地云天上天下惟吾獨尊者箇人人本具箇箇不無因甚世尊道箇獨尊師云龜毛拂子長三尺僧問和尚未登法座學人未離禪堂者一句請師指示師云者已是闍黎太絡索了也進云和尚作麼生師云山僧退身有地進云今日醜媳婦少不得見翁姑師云自領出去僧禮拜師乃云今日四月八是我佛降誕之辰法華云如來出世為一大事因緣惟令眾生開佛知見示佛知見悟佛知見入佛知見六祖云當知如來已具知見何用更開所言佛之知見即汝自心諸上座此一心法有佛無佛法爾如然叵耐無人識得如來出世纔為眾生露者箇消息雖露者箇消息猶是兒孫邊事此一心法總不曾動著豈不聞未離兜率已降王宮未出母胎度人已畢我道諸上座即今成佛竟度生竟涅槃竟還信得及麼諸上座莫言佛是累劫熏修而成我乃博地凡夫怎能搆得若作恁麼見是汝諸人自開眾生知見又莫言佛出世放光動地龍天擁衛神鬼欽崇我無如是神通妙用若作恁麼見自是仁者心有高下不依佛慧古人道如來舉身相為順世間情恐人生斷見權且立虗名假名三十二八十也虗聲有身非覺體無相乃真形此無相佛即今目前箇箇完具常自圓明佛不過是識得了有自由分雖在五蘊生死中而伊無生死雖在根塵萬境交參而伊自蕭然獨脫臨濟云是汝四大色身不解說法聽法虗空不解說法聽法是什麼解說法聽法是汝目前歷歷底沒形段是者箇解說法聽法諸上座豈不是在者裏聽法汝特地要求他面目了不可得雖不可得而一切用處却又分明是箇什麼如水無筋骨能勝萬斛舟珍重結夏上堂僧問恁麼也不得不恁麼也不得恁麼不恁麼總不得時如何師云山僧道不得進云恁麼則雨暗羅浮深又深潮歸大海總無聲師云庭下虗空為汝道進云昨夜老人起舞南樓上玉女笙歌向翠屏師卓拄杖一下進云只如今日結夏升堂拈椎豎拂未審以何等法示何等人師又卓兩下僧禮拜僧問前覺不生後覺不滅現在如如退後一步請師速道師云南無觀世音菩薩僧進前退後師云汝進前退後作麼僧作禮云放下師云笑殺大眾僧問華首開爐柴炭俱無薰風劈面裂肌膚同堂海眾忘消息現前共證古毗盧如何是毗盧師豎一拳進云聖凡情盡還容淘汰麼師又豎一拳進云如何是覿面無私句師又豎一拳云闍黎還知痛痒麼僧一偈云石虎嘯時風滿谷泥龍吟處霧遮天師云山僧今日失利乃召大眾卓拄杖一下云赤眼歸宗道會得則途中受用不會則世諦流布山僧不隨古人脚跟轉不會則世諦流布坐斷聖凡情若在者裏透得也做箇脫灑衲僧便能驅耕夫之牛奪饑人之食其或未然總是弄泥團漢復卓一下云會得則途中受用亦且救得一半便下座端午上堂僧問耀古騰今即不問喝一喝云現前一喝請詶機師云不酬機進豎一拳師云笑殺滿堂僧進一喝師云一喝兩喝且置三喝四喝又作麼生僧懡㦬師便打僧問剿除狂𡨥卸甲倒戈猶是功勳邊事君臣道合海晏河清猶是法身邊事如何是衲僧本分事師云口橫鼻直乃云纔過四月八又是端陽節奉報諸禪德光陰如電掣世事若有若無人情或欣或厭波斯匿王云變化密移我誠不覺寒暑遷流漸至於此諸上座還知有不遷流者麼驀拈拄杖云惟有拄杖子蕭然獨脫寒暑不能促其壽鬼神不能妬其福雖然如是衲僧分上眼中著屑以拄杖卓一下舉瑞巖問巖頭如何是本常理頭曰動也師云金剛寶劍當頭截又問動時如何頭曰不見本常理巖良久頭曰肯即未脫根塵不肯即永沈生死巖遂大悟師云者太煞按牛頭了大眾珍重可都寺為其父太保韓文恪公請上堂僧問有箇人兒與某甲同行同住為什麼不度渠儂師以拂子作圓相復拂三拂示之僧問習得千經萬論為甚當鋒一字拈不出師云上灘不肯住下灘不相干進云人人脚跟一條大路有箇漢子問著便恁麼眼睜口啞師云闍黎好一問還自知麼進云和尚婆心太切人天眾前合當禮拜坐具子吾無隱乎爾師云尋常套子也不消得僧拜起喝云若要有心聽此調耳根瞎却眼根聾師云自納敗闕乃云夾山大師道目前無法意在目前不是目前法非耳目之所到舉拂子云今日夾山現廣大身逼塞虗空諸禪德還見麼夾山發大圓音告諸禪德不得以色見我不得以音聲求我若以色見我以音聲求我是人行邪道不得見我山僧道不以色見不以音聲求如何得見大師夾山云汝豈不聞擬議前後安置中邊不得一法沒溺深泉山僧道都不如是時如何夾山云不敢說山僧道為甚不敢說夾山云堂頭即得恐諸禪德隨語生解山僧道官不容針私通車馬請大師不吝慈悲夾山云會麼都不如是我我現前諸禪德請著眼者裏眨上眉毛蹉過了也急急快急急著靴水上立走馬到長安靴頭猶未溼今日都寺祖禪同聖心原心妙心三居士設齋請山僧上堂資其父文恪公冥福伏願於真際中不守自性天上人間隨處安樂舉文殊問奄提遮女生以何為義女云生以不生生為義殊云云何生以不生生為義女云若能明知地水火風四緣未曾自得有所和合而能隨其所宜是為生義殊又問死以何為義女云死以不死死為義殊云云何死以不死死為義女云若能明知地水火風四緣未曾自得有所離散而能隨其所宜是為死義諸禪德恁麼會去生也未曾生死也未曾死皆如來藏妙真如性如來禪許汝搆去祖師禪未夢見在且道祖師禪有什麼長處良久復舉進山主問修山主明知生是不生之理為什麼為生死之所流轉修云笋畢竟成竹如今作篾使得麼進云汝他日自悟去在修云某甲祇恁麼上座如何進云者箇是監院房那箇是典座房修便禮拜師云者箇是監院房那箇是典座房有什麼禪道佛法於今三家邨裏販夫牧豎街頭市尾也解恁麼道有什麼奇特諸禪德會麼以拂子擊案云苦瓠連根苦甜瓜徹蒂甜下座解夏上堂僧出禮拜師便喝進云更一喝師又喝進云落霞孤鶩齊飛秋水長天一色師云拈者現成句作麼進云請和尚道新底師云山僧今日失利進云某甲也大錯去師不顧乃云諸上座一夏以來還搆得也未若搆不得者一夏又虗度也舉子方上座問法眼云公久參長慶為甚却嗣地藏眼云為不解他萬象之中獨露身意子方豎拂子眼云撥萬象不撥萬象方云不撥萬象眼云獨露身聻方云撥萬象眼云萬象之中聻方云若不到者裏幾乎虗過一生師云若要透脫生死把者一則公案反覆尋思自然有箇入處不見文殊云我真文殊無是文殊若有是者即二文殊然我今者非無文殊於中實無是非二相即今諸上座直下無第二人者裏不生難易想便可獨行獨步會麼復學六祖大師云吾有一物無頭無尾無背無面無名無字諸人還識否荷澤云是諸佛之本源神會之佛性祖云向汝道無名無字汝又喚作本源佛性汝向後有把茅蓋頭也只成箇知解宗徒山僧今日八字打開為諸人下箇註脚若是箇殺人不眨眼底漢纔見祖師道箇吾有便與震威一喝直饒通天伎倆也合一場懡㦬為甚如此諸上座人人壁立萬仞箇箇鼻孔撩天以拂子擊案下座林戒菴太守薦張恭人請上堂師召大眾云佛法本自現成盡十方世界都盧是箇金剛正體眾生諸佛情與無情山河大地日月星辰總承此光明顯發譬如虗空體非羣象而不礙彼羣象發揮當其發揮即非羣象所以道人行處實無一法可當情實無一物為緣為對大溈安云行脚高士直須向聲色裏睡眠聲色裏坐臥且喚什麼作聲色聲色裏又作麼生坐臥睡眠不見古人道見聞覺知無障礙聲香味觸常三昧如鳥空中只麼飛無取無捨無憎愛若會應處本無心方得名為觀自在諸上座空劫以前也恁麼即今也恁麼盡未來際也恁麼若信得及釋迦老子與汝同參若信不及便茫茫地向外著境外既著境內則生心心境相對妄想不停遂成生死業繫謂之塵勞之儔汝等試返照看者箇妄想從何處起是從心起是從境起若從心起心本無生若從境起境本無情目前空不言空目前有不言有者箇妄想皆從自己一念顛倒取相而起知心與境本不相到一一諸法當處解脫當處全真昔二祖斷臂求初祖安心祖云將心來與汝安二祖道箇覓心了不可得祖云與汝安心竟諸上座還覺痛快也未良久云覓心無得便心休著衣喫飯還仍舊大盡三十日小盡二十九如上舉揚般若奉為張氏恭人及諸亡眷伏願無邊業障一念霜融曠劫塵勞當下頓息且道懺摩薦拔一句作麼生道回光便是通霄路母子同登安養臺下座示眾黃巖示眾此事實非容易當時汾陽最後到首山舉卷席話始大徹去你看龍袖拂開全體現象王行處絕狐蹤者方是放身捨命會得者則管取透得風旛那則今日山僧拈出若有人問不是風動不是旛動意旨如何向他道龍袖拂開全體現仁者心動意旨如何向云象王行處絕狐蹤大眾會麼又如大慧當時參有句無句話屢請圓悟舉在五祖處問答因緣悟為舉了大慧方得大徹今日山僧又為拈出若有人問不是風動不是旛動意旨如何向云描也描不成畫也畫不就仁者心動意旨如何向云相隨來也會麼會麼雙柏林示眾大眾你道今時人病在什麼處一箇箇勞盡心力祇學得箇心所法有什麼交涉即如我年來鑒賞即心即佛句妙不可言其柰知音者少當時亦止有大梅一人直下承當何況後代你看僧問大梅因何便住此山梅云我當時見馬大師向我道即心即佛便向此住僧云于今大師又道非心非佛梅云者老漢惑亂人未有了日在任你非心非佛我祇是即心即佛大眾者則因緣那一箇不曉得為什麼在各人自己分上便用不著且道病在什麼處咦此事大難承當直饒一句下承當得已遲八刻更費盡心力勞而無功切莫打頭便蹉了路珍重歸宗示眾我宗門下大是奇絕當時黃龍南趙州勘婆頌云傑出叢林是趙州老婆勘破有來由而今四海清如鏡行人莫與路為讐祇因者頌大了當後來出許多人黃龍心湛堂凖真淨文都是者一支湛堂託鉢偈云之乎者也衲僧鼻孔大頭向下若也不會問取東村王大姐真淨住歸宗有一僧持其法語至黃梅五祖演亟呼首座圓悟云真大善知識者法語實希有中云于今學道人有兩種一種祇是認箇平常如云金剛是泥塑露柱是木頭倚將去靠將去又一種坐在無依倚處殊不知早依倚了也者兩種人到己眼豁開時兩條拄杖都丟却獨行獨步十方蕩蕩無有不可五祖深服者段話合掌讚歎所以雲居膺和尚云饒你學到佛邊猶是雜用心何以故祇因將心求道故若將心求道便是心識用事便是生死根本玄沙亦云有為心法不可相依日久年深全無利益此事大難于今人祇是學些道理太遠在眾禮拜師復云我所以處處都提即心即佛我即以即心即佛為宗旨汝等悉之歸宗示眾邪人行正法正法悉皆邪正人行邪法邪法悉皆正於今有種邪人便拈提佛祖言句也歸於邪總為他從正法中多生支節真箇入地獄如箭射大可憐愍從上佛祖祇令直指人心見性成佛更無層級大根器人當下省得便謂之悟即未悟之前實無途路實無方法也祇是教他疑著所以云信得極便疑疑得極便悟趙州云若要隨根機接人三乘十二分教儘有方便老僧者裏祇以本分接人大眾若信得者話只管疑著不必解會他日久自然瞥地始知山僧不是相瞞珍重小歇場示眾山僧自莂公去後心中一發冷然渠一生為此事孜孜矻矻纔有箇見處正好修行早已整手脚不辦況其他乎即以道眼觀之彭殤無別然已恨其力行日短若論世眼更不堪提起咦世間人信心難生善根難長不能深信因果未免為現前報應所惑山僧每每見人發一箇好念頭便生病惱作事便不知意那一生造業底偏更快便爭怪得初心人不打退鼓于今目前大眾都是看得破底何不趁色力康健急切取辦人生好光景難得若到病苦時作主不來雖有善師良友不能替代今日與大眾道破一知半解當不得甚事石屋云欲求成佛真箇易欲斷妄心真箇難幾度霜天明月夜坐來猶覺五更寒見解人多行解人萬中無一湧泉亦嘗恁麼道故知此事不是說了便休到此須大著精彩始得昔丹霞淳與友論道到暢快處大笑一聲其師叱之云你者一笑失却多少好事他是得底人其師尚如此說如今學人終日談彼說此山僧最是不喜山僧二十歲前便得箇歸著在廣州東門行至西門如瞬息間人物房屋都不見有經言阿彌陀佛七千歲在城託鉢不辨男女七千歲不貪睡眠大眾此事雖是現成也要善用其心譬如一團黃金全憑巧匠方成器用不是一番寒徹骨爭得梅花撲鼻香記得馬祖會下有箇無業國師幾句說話山僧常舉以自儆云古人得意之後都是茅茨石室王侯不得而友那像于今為名為利又當時三祖傳衣後囑四祖勿向人道在者裏得法覺範云名與跡人生之大累也古人未得意時一雙草鞋一條拄杖到處訪道及其既得便向深山中埋名滅跡數十年人無知者你看三祖如此尚沒人知他姓名與他住處後來開堂說法乃至五宗分派遞及宋元漸失古意涅槃經有箇喻如做乳酪初賣底是真乳酪遞轉侵水全無真味難道法有什麼古今叵耐古今人大相懸絕趙州嘗道老僧見馬祖會下善知識箇箇出格九十歲後見者些都是向大路開飯店覓人禮拜到今日越發可傷了那一起求化底不說為辦道之資且問他辦得箇什麼道咦古人說佛之一字尚不喜聞如今佛之一字真箇不喜聞了你道是同是別大眾生死事大無常迅速山僧十餘歲時心中早已有些了當妄想道六祖大師二十四歲方傳衣鉢我今還未滿二十若到三十歲一字不看但饑餐渴飲混同樵牧彼時山僧老母尚存常到城中省視老母深知山僧意每道我實為你累若不是我你早入山去也後來老母去世靈泌弟將母衣物一時散却山僧亦將靜室中所用器具一時散却止剩些破衣襖兩人共湊六十觔行李走到博山者段因緣舉起太長約略如此那時法緯樵雲都在博山樵雲在外面不知何以得箇消息託人向悅眾求入後堂與山僧隣單後來山僧要辭先師先師苦留幾次收入行李及得脫身二子苦要相隨山僧此時亦無意廬山因過瑞洪聞無用道友在歸宗遂去尋他不期遇見半偈老師隨上金輪峯禮墖半師留住金輪山僧向他道我本意要隱終南聞終南多草衣木食與人境相絕半師謂金輪閉關與終南無異因留止三年自出關後便要別却諸子千較百計支遣不開及後莂公又到與諸子遊徽州復返盧山一路追隨偶到黃巖樂其深入遂止於此數年以來又置些田地添許多絡索山僧前日從中還山見大眾著忙心極不快修行人常得安閒方可入道止是家業相累徒過光陰昨星子張公同歸宗當家來請山僧尚躊躇未決于今到是恰好乘此機會卸却擔子何等輕安山僧從幼便擬孤峯獨宿誰知事不由人提起來真是慙媿博山先師當時常道宗寶我深悉汝意汝只想入山去得兩餐飯喫便一切不管正道著山僧意中事于今大眾須要體諒雖山僧者等却像小乘依菩薩行祇願度盡眾生寧可自家墮落乃至度一人數劫相隨其人不發心菩薩亦不動念山僧不能行菩薩行度盡眾生但願與大眾大家著緊如救頭然便滿鄙意大眾既恁麼相信須是依山僧說始得此事元沒有愛憎彼此盡力道不出底只是冷暖自知緩急自辦時節到來不怕你會不會所以前日莂公去時我對法緯說以後更不必題起禪道佛法口說底無用須是急切有恁麼事始得你看莂公底心真是成佛有餘祇是不曾實落用心便已容易蹉過大眾于今只管蹉跎去真不知等到彌勒佛婁至佛了咦山僧要說說不盡然亦不消說伶俐漢向未舉以前便知痛癢就是山僧者一段話都是多底明日過歸宗須要甘得澹薄圓通訥禪師祇有一塊布日間當裙夜聞當被山僧自來不曾貪著好衣好食如今但有兩餐粥飯便放下身心絲毫不管佛在世時弟子甚眾一千五百大阿羅漢常隨其身那時有什麼常住錢糧也只各人入城乞食食已便各人樹下趺坐大眾于今各人也須自家料理牛頭嬾融肩挑石二腰纏八斗供其徒眾大眾都是難得底山僧亦當効古人所為只是賤體太弱不能如願大眾須要體諒山僧始得珍重音釋瑰姑回切音傀瑰瑋琦玩也偉于鬼切音韙人才傀偉摺之涉切音讋摺疊也麋旻悲切音眉鹿屬嘿密北切音墨與默同
