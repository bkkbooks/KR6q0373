body:
  text: 丹霞法孫今釋重編書問答張莂公孝廉附來書大鑒祇具一隻眼大通雙眼圓明永明老人可謂極護正法不令狂禪窺其涯涘乃擔板漢終日遏捺妄想以求一念不生往往附會其說就中差別伏乞開示達磨大師云行解相應名之曰祖豈非雙眼圓明耶湧泉云今時人須要盡却今時始得成立又云須要識乾識若不乾敢道輪迴去在敢道啼哭有日在豈非重於行履耶溈山云祇貴子眼正不說子行履豈非重於見地耶得底人他自知時修與不修是兩頭語則非離見地外另有行履離行履外另有見地矣大通雙眼圓明永明此語極救一時之弊豈與盲修瞎煉遏捺妄想者同日語哉答曾宅師孝廉附來書達磨一宗以直指為標題以悟門為究竟宜了當人現成機用一切分量漸次俱為剩義乃古人云百丈得大機黃檗得大用餘者盡是唱導之師似此各有分量疎山云咸通年前悟得法身邊事咸通年後悟得法身向上事尤屬漸次既有分量漸次則一悟似非究竟何謂直指所以己眼未開人因此致疑稍有省悟者又狂心未息豈不見高亭隔江招手橫趨而去船子覆舟示非別有耶大慧答李漢老書云公於一笑中釋然還更有奇特道理麼若更有則却似不曾釋然也乃又云公欲明大法應機無滯但且仍舊不必問人久久自點頭矣此皆師家親身經歷方能於直指具大方便令學者隨器隨時獲大饒益可見法源深遠不可類齊只今宗風掃地賴我和尚開大罏鞴無不成就懇求拈出差別垂示將來達磨一宗原是直指人心見性成佛實以頓悟為則若悟則一切現成絕諸分量即悟之一字亦不立豈有頓漸彼此哉雖然春色無高下花枝有短長隔江招手橫趨而去頓悟者也咸通年前咸通年後漸悟者也此人有利鈍非法有淺深也李漢老一笑釋然實無奇特矣而又疑大法不明故大慧云但且仍舊不必問人久久自點頭矣此語有權有實有収有放百丈再參德山不會末後句古人絡索皆從者裏出張無盡見兜率悅悅云德山還有末後句也無無盡云有悅大笑而起無盡終夜深疑始大徹去如婆子燒菴云二十年祇供養個俗漢保壽云瞎却鎮州一城人眼如此機緣逗漏不少正是宗門最後爪牙若遇大根學人一見便了實無分量漸次惟中下之根未易窺測故善知識具大方便垂手巧妙而不失直指之旨時節既至其理自彰耳答金叔起文學欲究無上大道知之一字最為親切然知之一字成却多少人敗却多少人不可菽麥不分也凡有所知皆是緣慮心苟有個道理存在胸中亦是緣慮心假如一切放下但守個知字亦是緣慮心連者個知字都放下單單守個無知亦是緣慮心緣慮心者生死根本也靈知者無上大道也祖云不見一法存無見大似浮雲遮日面不知一法守空知猶如太虗生閃電亦云幻知知無真知無知到者裏不許有知不許無知又異於木石且道是個什麼若向者裏信得及許你有個見處山僧恁麼舉似須是急著眼始得答金以質文學去年三接手翰祇是痛傷令愛之意不息耳雖人情難遣豈不聞生死事大無常迅速耶世之極壽者百年極夭者十歲過一百年極壽極夭者都不可得所謂彭殤徒自異生死終無別也文殊師利問維摩詰言菩薩云何觀於眾生維摩詰言譬如幻師見所幻人菩薩觀眾生為若此如智者見水中月如鏡中見其面像如熱時焰如呼谷響如空中鳥跡如水上泡如石女兒如芭蕉堅如電久住菩薩觀眾生為若此文殊師利言菩薩作是觀者云何行慈維摩詰言菩薩作是觀已自念我當為眾生說如斯法是即真實慈也如上所舉最為親切請居士常作是觀萬念無有不銷鎔者況居士學道多年今處順逆境中毫無主宰與不學道者何異惟痛自警覺為慰答陳秋濤宗伯即心是佛率性謂道為仁由己聖人雖往而面目猶存此為直捷誠如閣下所言然信心二字祇要直下承當閣下恐學人煞執師心滿假非無所見第與率性由己之語似相違耳山僧雖學佛而不識儒亦曾聞皇天無二道聖人無兩心請略辨之所示未信則常虗而靈既信則易實而礙不知閣下如何看者信字吾宗門實重此信華嚴云有能說法之人有所聽法之眾尚未入信門信之一字豈易言哉又云信是道原功德母信是無上佛菩提信能速登解脫門信能永離生死苦又云不信一法方信自心是以吾宗門信心實有下落不事空言但須分個早白即如文王望道未見孔子仁聖不居與明月摩尼等喻尊意以為拂信之跡恐人生著極是玄妙之談第最初不知從何處下手然後不居信地又不知尊意先知後行耶先行後知耶若先行後知既未知如何行若先知後行則與貴知有而後踐履似為相近惟不知所謂知者何物耳苟非於知上原本清楚遂謂要行即有功勳盡是有為盡是臣種雖飽無力不離識情假饒窮到玄玄玄極處無無無盡頭都不許可謂其知處先錯行亦無謂也所以宗門大旨知外無行行外無知知到極處即是行行到極處即徹知恁麼看來知行合一然亦不過強貼耳豈不聞知之一字眾禍之門知尚不立而況行耶到此田地喚作先知後行不得先行後知不得知行合一亦不得非情識見解可到閣下大須著眼始得藥山問石頭三乘十二分教某甲粗知嘗聞南方直指人心見性成佛實未能了石頭云恁麼也不得不恁麼也不得恁麼不恁麼總不得子作麼生此處倘不深悟深信必然顢頇儱侗靈潤禪師山行遇火其徒云請師避火潤云心外無火火到自滅一人山行被蛇傷足以為枯樁所觸行三十里遇捕蛇者識為蛇毒告之其人聞而立斃且道未遇捕蛇人云何行三十里無恙纔聞蛇毒云何立斃此皆心外無法祇是當人信不及耳若信得及心外實無毫釐法可得所以云無邊剎海自他不隔於毫端十世古今始終不離於當念山僧生平祇信此心亦以此心教人實有原本上接西來祖意下辨邪正關頭惟此而已其中委悉非言可盡閣下倘共信此心不妨覿面商確方纔痛快至於道聽途說魚目明珠之混雖聖人之世亦所不免若因此輩而遂疑信心之道有未盡則又因噎廢食也過承寵誨知留心性學誠世出世間希有喜極不敢不竭其愚以備蒭蕘之採辱賜佳刻兼惠腆儀統此鳴謝又附來書僧問大梅見馬祖得個什麼便住此山大梅云馬祖道即心即佛僧云馬祖近日又道非心非佛大梅云者老漢惑亂人未有了日任汝非心非佛我祇管即心即佛拙見此語死煞不像參悟而馬祖何以即首肯梅子熟也然則非心非佛之語果係惑亂人耶當時大梅何不直說者老漢非心非佛正是即心即佛不較有著落耶請質高座望一剖示即心即佛表語也非心非佛遮語也今人多重遮語謂無痕跡而忽表語不知即心即佛惟過量大人方能擔荷馬祖下出八十餘善知識如大梅能有幾人看渠問馬祖如何是佛祖云即心是佛渠便禮拜正如良馬見鞭影追風千里任汝非心非佛我祇管即心即佛三世諸佛列代祖師移他不動者老漢惑亂人未有了日山僧更喜此語尋常人祇知門裏出身那知身裏出門者個田地馬祖大梅心心契合更不費一些手脚若云非心非佛正是即心即佛猶為周摺了也死煞一語得無孤負古人二祖覓心了不可得達磨云與汝安心竟與此同一鼻孔非大根器豈能如此直捷至於參悟是學人途路邊事何可語此答韓猶龍文學纔與麼便不與麼轉轆轆地如大火聚有什麼近傍處永嘉云常獨行常獨步達者同遊涅槃路妙則妙矣猶是方便之談衲僧巴鼻自己尚無獨知之地他人豈能窺其蹤跡耶古人云三世諸佛不知有狸奴白牯却知有從上大手眼尊宿行履大都如此總是見徹根源絕諸滲漏若猶有個保任在則能保者是個什麼所保者又是個什麼本是一心却成兩立更有個平常有個不可思議有個昭昭靈靈有個見聞寂寂總是識情生死根本所以山僧常道凡筆所畫者都是畫不是筆眼所見者都是物不是眼心所知者都是境不是心諳得此意敢保掉臂而行矣答黃无咎文學所呈來見都是識情作道理會所謂依他作解障自悟門總是求會太速不曾死心一番耳此事祇貴了得若空曉佛法有什麼用處法師家到是說得玄玅要且目前便不知下落所以我宗門下事迥別餘乘道人若信得及便將日前知得底解得底盡情𢬵置却向不知不識處提個話頭念念勿忘以悟為則須教自悟自肯方纔痛快祇要長遠耐煩耳又此事須覿面一見若祇管說道理有什麼了時古云解屬於情情生則智隔矣來札云本來面目祇是一心清虗泰然此乃識情卜度耳又云無心可得空空洞洞一絲不挂等語尤為著空至拈枯木寒巖等話總是錯解工夫還不是者般做此事絕非容易沒量大人尚不柰何道人又爭得容易耶且如生死即刻到來一時心識昏暗痛苦無量平時所見空空洞洞底道理畢竟用得著否敢道決用不著便請將者些眼見耳聞書本上理會得底道理盡情拋却食息依舊食息起居依舊起居讀書做事依舊讀書做事但二六時中不要將此念放下常常提起看什麼處有疑父母未生前在什麼處安身立命一口氣不來向什麼處去不能無疑就在者裏疑如僧問趙州狗子還有佛性也無州云無者裏還有道理還有理會處麼若無下手處就在者裏下手晝參夜參畢竟是個什麼道理務要看破趙州老人立地處方纔了當初心做工夫最忌不肯疑言句古人有不疑言句是為大病之警無字話頭佛祖骨髓此疑一破則參學事畢矣與熊心開總理聖人所以同者心也凡人所以異者情也此心彌滿清淨中不容他徧界徧空如十日並照覿面堂堂如臨寶鏡眉目分明雖則分明而欲求其體質了不可得雖不可得而大用現前折旋俯仰見聞覺知一一天真無暫時休廢直下證入名為得道得時不是聖未得時不是凡只凡人當面錯過內見有心外見有境晝夜紛紜隨情造業詰本窮源實無根蒂若是達心高士一把金剛王寶劍逢著便與截斷却不是遏捺念慮屏除聲色一切時中凡一切事都不妨他祇是事來時不惑事去時不留古人所謂內心一毫不放起外境一毫不放入更非強為內心從來不曾有一毫起外境從來不曾有一毫入渠識得破保任得恰好合著本來主人翁耳洞老若解恁麼做工夫無有不露裸裸底時即與諸聖同一鼻孔同一受用矣軍中機務殷繁山僧於此大光明中祝佛天加被惟願少病少惱𡨥氛潛息一念無為十方坐斷千萬珍重昨歲偶被業風吹入嶺南初夏擬還匡山圖盡契濶可得與否尚聽後緣臨楮懸切示能素韓夫人佛言見性學道難盡世修行如毛見性如角今之學道者雖多而發心出世者實少不過行善事修福田求來生果報祖師云自性若迷福何可救故欲超生死必須見性以生死從迷性而起性若不迷情與無情一切諸法元無所起楞嚴云眾生生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉言常住真心者即本來面目也言妄想者即汝日用間思善思惡起滅不停是也日間便是想夜間便是夢日夜不息正是輪迴生死根本汝若覺得常住真心並無此事汝纔不覺妄想便生盡未來劫無有底止於今要得超脫生死第一要識得自己真心如伸手見掌如稠人廣眾中認得自己父母斷不問人是與不是既能識心自解作活計所謂作活者一切動用如其自心念念相應不生支節日久歲深水牯牛自然純熟矣昔嬾安禪師問百丈弟子欲求識佛如何即是丈云大似騎牛覓牛安便問識得後如何丈云如人騎牛到家又問始終如何保任丈云如牧牛人執杖視之不令犯人苗稼安便禮謝後住溈山示眾云我三十年祇看一頭水牯牛如今成個露地白牛終日露迥迥地常在面前趁亦不去又石鞏禪師在廚下作務馬祖問汝在此作什麼鞏云牧牛又問作麼生牧鞏云一回入草去驀鼻拽將回此二則機緣忒煞詳明老夫人及眾道人可細味之無忽又近日不知用心若何本來面目確然見得也未思善思惡緣慮底心亦曾休歇也未若未見得本來面目的確千萬不要雜用心一切家緣且當撥置務要心地虗閒方可專心一致然不得急急則勞困反成退息緩則懈怠且散亂矣惟貴緩急得中善調其心即獲一切功德止是堅凝正念以悟為期斷不負人也答韓漢逸文學離心之外更無別佛居士當發信心信自心佛若人信自心佛即為諸佛之所護念其福無量然何為信耶何為不信耶信者應當觀察我即是佛佛體既真即今眾生之情從何而起諦審諦觀念念不捨忽然省得起處漢逸亦要來著忙此事矣答韓耳叔文學接來札深悉近日精進甚愜鄙懷般若之在人喻若金剛斷斷不能埋沒也慚媿悔過自是塵勞良藥據山僧意不若從今自作主宰行將去古德云佛法有什麼多事行得即是如人識得路了却在路邊只管歎惜追悔坐著不行豈有到日惟居士勉力行之途路高低曲直長短行之自悉便是過來人祇能替人說得不能替人走得也答韓季閒文學從凡至聖不出因果二字但有時報不定之分亦有時報一定之分如今生作惡來生必報而報必遇時時若未到未即報也能懺悔改過其罪可滅若時報已定即聖人亦無由免矣所以修行最要謹防三業三業通乎五戒堅持五戒三業自淨五戒不持人天路絕此佛誠言豈欺人哉來札云未行善事惟知惡不可為此語固是然不為惡即善不為善即惡善惡並行却不並立知不為善之即惡豈可但不為惡而已耶居士有根器人應當努力依此修行人天果報决定可期若論向上須知惡時無善念善時無惡心善惡如浮雲俱無起滅處能於此徹見即可以立地轉凡成聖不復以有漏之因相位寘矣慎之別袁道生居士道心貴切不可因循人生百歲轉眼成空苦不覺耳若待了却目前方圖出世終無了日每見聰明伶俐者多中此病虗過一生老死徒歎可悲也居士澹泊寧靜大有近道之骨會當不落人後其柰山野老婆心切何此去匡山有年餘之別聊書數言以當砥礪惟念之與黃孟顒文學足下宿植善根故在富貴安樂中不為富貴安樂所埋沒蓋智慧人也智慧者雖享諸天之樂且知其不久況人間頃刻乎經云三界無安猶如火宅則天上人間總非歸宿之地足下試思即今六道茫茫無所底止死生醉夢窮劫莫醒其過咎何自而起者裏若知痛癢方有下手做工夫處方有說話分既者裏不明心裏不肯放便是工夫有疑只管疑將去食息起居不要放捨愈絕消息愈加逼拶拶得心路俱斷祇有此一疑頓在面前柰何不得到恁麼時切勿生異念起速效待悟等心反為障礙古人訶為偷心也參禪要死偷心偷心死後方能瞥地方纔慶快平生先聖云窮玄極玅以悟為則斯言盡之矣然初心做工夫誠難前無進路退失故居實是踏脚不住若非大根器人未有不退墮者況去聖時遙魔強法弱稍知趨向此門又以作福行善為極則斷不信有立地見性得道之理聞舉即心即佛能不掉頭者實難其人居士智慧過人幸自勉生死事大無常迅速莫只當一句話恁麼念過也示能善韓道人學道惟貴痛切一刻不可放過蓋從無始劫以來迷而不覺今一旦知愧已是三四十歲若更因循更有百年亦頃刻而已古來學道之士如癡似兀其道愈深其養愈淳故能以道力勝業力然業力豈有體性祇藉道力翻騰一轉實轉換由人耳道人既堅忍向道惟當努力行之須知一切諸法皆從心起過去之境已去未來之境未至現在之境無住都不可得何以見其都不可得即目前言之有時滿目青黃汝若不著意見猶不見汝若著意則一切歷然法之有無由我心現無前境可得也古德云一切諸法皆從心生心若不生法無能住此與最上人語非餘外人可聞也示翁自通昔曹山辭洞山洞云子向甚麼處去曹云不變異處去洞云不變異處豈有去耶曹云去亦不變異古人悟處的確自然絕諸滲漏自通幸無忽略也學道人須貴知時一切時中斷然不可放過如人常在家不愁家事不辦人人有此一事亘古亘今有佛無佛法爾如然迷亦不失悟亦不得但以染淨區分致使聖凡迥別諸聖淨用蕭然獨脫凡夫染用長劫輪迴是以全憑日用智照洞然洗刷無量劫來習氣種子所謂道力勝業力大有轉變也且真心本淨非從新得忘想體空染而不染便恁麼休去即有落在撥無因果者所以染而不染不妨翻染成淨淨非新得不妨還淨去染聖人得此方便是以解脫凡人失此方便是以沉淪轉變在人聖凡無實法也示二童女維摩居士室中有一天女年方十二辯才智慧巧玅絕倫舍利弗尊者問云汝云何不轉女身女答言吾從十二年來求女人相了不可得當何所轉又灌溪和尚參末山尼問如何是末山主山云非男女相溪喝云何不變去山云不是神不是鬼變個什麼溪便禮拜山僧即今問汝等非男女相是個什麼又云不是神不是鬼變個什麼看他何等穩當天女云吾從十二年來求女人相了不可得當何所轉乃三世諸佛法印慎勿錯過從上大手眼人行履多出於此汝但於十二年來求女人相了不可得一句看得透徹則不見有世間出世間相內不見有身心外不見有器界上不見有聖下不見有凡即今不見不生死末後不見有涅槃威音王以前也恁麼即今也恁麼盡未來劫也恁麼無一法可得亦無無可得者到此田地心空及第歸矣書此以勉併示二頌非男非女顯家風神鬼如何像得同昨夜東邨人唱曲今朝僧打五更鐘十二年來不可得經行坐臥是阿誰欲藏愈露難遮掩留與叢林作指歸答韓猶龍文學宗門事惟上根人直下承當中下之機絕分不開戶牖不設蹊徑覿面全提親證親得更無如何若何極而言之即心是佛一句道盡矣然即此一句亦屬引誘因人有說若當機領會時絕諸氣息絕諸思議嘿契而已苟不如是便是妄認識神強作主宰因渠平日不曾發得出生死心又善根微弱或看教乘理路以為己解遂乃忽略不信有悟還說悟是落第二頭如此等正所謂識心卜度也後代秉持正法須要分個皁白是以高峯拈提大有所以山僧當時實從此段因緣打翻消息此後絕淆訛處悉皆勘破方纔知得解路與悟門依稀相似而實如雲泥之隔即高峯亦不過就解悟分途直捷指出作個馬祖功臣看其拈提自然明白如尋常人祇管道心外無佛佛外無心此豈不是解耶如何是佛石壓笋斜出崖懸花倒生也須是個人始得與金正希內翰學道祇要得其門若得其門急亦到緩亦到若失其門緩急皆不到確實而論祇要親到不疑之地不須問人生也恁麼死也恁麼盡未來劫也恁麼者裏少有一毫疑處便是銀山鐵壁即受人處分矣若更別作計較看語錄研教乘及覓阿師口裏轉使心頭亂似麻在不見圓悟大師云汝怎生聽得諸方老師口裏一個說一樣正謂此也倘又勉強拍盲硬作主去終有困時山僧向曾與居士道有為心法不可相依日久年深全無利益居士亦云此語實是然則夙具智慧者豈待山僧贅語耶持戒禮懺入道助因了悟自心方為極則聞居士熟讀楞嚴直指人心見性成佛亦無出此經者惟人自肯乃方親耳與梁未央文學吞舟之魚必遭漁父之手而漁父未敢即下手者海濶水深魚勢力強也待其洶湧之勢稍息力困神疲漁父隨手得之近有大心凡夫善根深種堪紹佛種而善知識未敢即著忙者境風洶湧五欲海深煩惱力強亦姑待之吾未央是也境風終有歇時五欲終有淡時力強終有困時止爭遲早耳佛說出息難保入息每見有我欲待時而時不待我者未央能無一動心耶華首是我輩歸宿之地千萬留意真乘近有入處知所樂聞今春晤洞老於江州舟中語祖禪口述不盡與等賢文學修福不修道祖師叱作迷人惡心行布施經中指為魔業以此觀之第一福曰無如心地法門矣若不識心貪瞋癡種子決難銷隕縱有天福升而復沈如繫足鳥高飛無益所以學道人修福不如見性若能見性福更無窮山僧此說惟貴五宗直路而行永無捐棄當見諒也與翁聲文居士天真佛性常自圓明父母未生前也恁麼即今也恁麼盡未來際也恁麼本來無一物既無一物喚什麼作本來於此有個窺處最省心力一切時中不犯手脚異念纔生猛自割斷方便喚作定慧不是實法也若論此心本來自定自慧黃檗云此心常自圓明徧照世人不識祇認見聞覺知為心空却見聞覺知即心路絕又云若要識心亦不離見聞覺知然本心亦不屬見聞覺知至此實要當人自省不在言說言多去道轉遠矣省得底自知時節不消問人一切妄想情念自然銷隕此學道之驗千虗不如一實也若不如此任你將心用心日求功用盡屬無常盡歸生滅祖師云若欲修行覓作佛不知何處擬求真若能心中自見真有真即是成佛因不見自性外覓佛起心總是大癡人願熟思之無忽山僧客歲別後多歷危險莂公不起心更冷然喜麗中到山已作廣額屠兒大丈夫故當如是聲文自處應亦不薄祖心諸子先回聊通此信珍重與藍朱公文學經云一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力夫此一念非前際生非中際住非後際滅圓古今通晝夜絕去來無邊表無動搖求之不得避之不能直下知歸則全體現前當處不覺則千境紛惑凡聖關頭誠不越此然此猶是說理之談動傷唇吻若論我宗門一切坐斷如銀山鐵壁自然絕諸滲漏佛見法見他尚不起何況更起塵勞煩惱耶昔有魔王隨金剛齊菩薩一千年求其起處而不可得南泉猶謂是進修位中則知從上來事非粗心淺識能知涯岸要到恁麼田地但看僧問趙州狗子還有佛性也無州云無看得者無字破敢保大事了畢前授風旛因緣恐涉義路還看狗子無佛性話為玅答翁子郊居士迷聞經累劫悟在剎那間最初威音王未為早末後婁至佛未為遲祇在當人忖量生熟如何相應不相應耳若果見徹根源行履穩密處身如無身在世如無世不落見聞窩臼不隨妄想遷流則塵中能作主宰雖在生死海頭出頭沒而不見有生死可得吾子自審能如是耶即緇亦可素亦可如其未然勉強何益志在仁者非山僧所知也與關起皐文學凡人發心皆有因緣因緣具足方得成就論云譬如木中有火無人鑽研火終不得涅槃有三因謂正因緣因了因火喻正因一切眾生皆有佛性也鑽研喻緣因良師善友激發也火出木盡喻了因也木即煩惱生死也一切眾生若無善友激發雖有佛性被煩惱遮覆不得現前豈能解脫是以欲求解脫實要因緣祖心是足下激發之友當深信之與林得山憲副居士是宗門根器但慧多而定少日聞尊恙益當禪定攝心且不論悟與不悟但論目前勿當面別覓修行永明云學道之人別無奇特但日用於六根門頭消除情念斷絕妄緣對五欲八風情無取舍心如頑石始有學道分居士夢金剛大士云只要作得主正是此意幸以心力為憑勿靠藥力至企又聞貴體清安甚慰益當精進矣然精進作麼生難道撐眉努目豎起脊梁是精進麼六時禮念燒香散花是精進麼不見道若起精進心是妄非精進若能心不起精進無有涯居士且細看心不起三字臨濟云已起莫續未起莫要放起勝你十年行脚華嚴云心不妄取過去法亦不貪著未來事不於現在有所住了達三世悉平等正是者個道理此事趁強健時早討個下落常以去年病苦光景放在面前始有䇿進分待得年運已深把目前好光陰都放過了恐異時做手脚不及珍重音釋菽式竹切音叔眾豆之總名噎烏結切音咽咽喉蔽塞之名寘支義切音觶置也猶言安著也礪力制切音例磨石也崦嵫山礪石可磨刃吻武粉切音𢪛口邊也
