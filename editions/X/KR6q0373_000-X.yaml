front:
  text: 長慶宗寶獨禪師語錄序龍其嗣法門人圅昰撰刻華首語錄成承和尚特遣人命圅昰為序圅昰謹再拜稽首而言曰昰烏足以稱道和尚哉雖然聞之知弟子者莫如師昰六七年親承訓迪所費和尚熏陶涵育若或於揚眉瞬目若或非揚眉瞬目其為之也既奢則意其遇之也必浚將俾昰之躳遭目接以示天下後世之為昰者此則昰之弗敢辭也憶昰甲戌知有此事來循覧天下彼時胸中惟黃巖天童兩老而已及一到黃巖便絕志行脚非謂天下無人也一山㘭老漢日堆堆地無長技奇識而乃窮歲月而不得竟其所至是用焉往耶目今門下士惟昰不慧餘皆瑰琦俊偉出可為人天師隱亦堪作山林典則而且逐逐焉營營焉如有所戀而弗去夫孰為是是則天下後世亦大槩見矣至於提持向上則古之百丈黃檗足以當之語錄具在知音者可辨也若廼讀其書而思見其人則祇今華首山㘭依然日堆堆地無長技奇識耳親之而一無所與遠之而若有所失當此如人飲水冷煖自知幸毋當吾世而坐失也此昰之所以告天下後世也然終不足稱道和尚也自序詳夫佛祖之道原以直指人心見性成佛為標題以悟為則夫云人心即是即不煩手脚矣但以悟不悟差別耳若悟則凡夫與佛祖契同即凡心而見佛性誠無轉摺不悟則業識茫茫無本可據即是生死苦海實不從他有本法不曾動著一毫是以空劫今時打成一片眾生諸佛豈有二耶詰本窮源祇是一心而已惟此一心更無毫釐可得德山云佛也無法也無又云若向盡十方世界若有一法一塵許與汝執取生解者盡落天魔外道水陸諸神自己亦不是善知識亦無禪道可學恁麼舉揚可謂不容毫髮矣初祖西來密傳心印心心印可以心傳心不開門戶不許解會惟貴直下醒得至於垂手接人或入門便喝便棒或攔胸搊住或言辭善巧痛處著錐甚至云麻三觔乾矢橛直指之道於斯盡矣道獨不知何幸熏得此心一聞即心是佛便信得及捨此必無他向偶遇壇經一言便醒如甘露灌頂醍醐潤心嗣後還疑別有或參或究或問或學實用盡心神費盡心力累盡形骸比研究五宗及諸祖腦後鉗錘至於極頭處九九還歸八十一從前用了許多工夫畢竟臨末梢頭亦非別有自此本擬深隱與麋鹿為群豈敢人前露布說是說非耶無柰法字卍子夙生緣熟一見便信如膠如漆不覺囊錐始露又引得數子亦來嘗些苦味帶累山僧不能緘口嘿然偶隨問隨答諸子隨抄隨錄遂成一冊固請流通山僧再三止之古人許多語錄束之高閣而今人又過於古人耶且吾實取信於心不求人信何用刊刻哉諸子固請不已廼不得已而從之長慶宗寶獨禪師語錄目錄卷首序文卷第一上堂示眾卷第二示眾卷第三示眾茶話問答著語卷第四頌古偈贊卷第五書問卷第六書問雜著行狀附塔銘附長慶宗寶獨禪師語錄目錄終
