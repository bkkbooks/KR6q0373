body:
  text: 丹霞法孫今釋重編示衆歸宗示衆師顧衆云修行者事大非容易知有底人如龍得水似虎靠山若未知有便須尋箇活路從來善知識沒有什麼與人此事非可口傳手授還是自家伶俐轉變始得古人道大有轉變始脫生死于今你們現前尚且茫茫地何況生死到來便是知有底人也不得草草萬古碧潭空界月再三撈摝始應知汾陽者話大有所以者所在著不得一些知見三乘十二分教一切修多羅難道不詳盡麼你道病在什麼處將心求道將心學禪窮劫盡形終不能得所以道饒你學到佛邊猶是雜用心山僧從小為者一著子喜樂不過記得古人一段機緣真箇痛快昔洞山辭雲巖問百年後忽有人問還邈得師真否如何祗對巖良久云祇者是山沈吟巖云價闍黎承當箇事大須審細此時洞山尚涉疑後因過水覩影方悟前旨有偈云切忌從他覓迢迢與我疏我今獨自往處處得逢渠渠今正是我我今不是渠應須恁麼會方得契如如者箇偈真妙得很你看打頭兩句人還會得我今獨自往處處得逢渠便難會也然尚有一關渠今正是我我今不是渠五位君臣都從此出憶壽昌師翁拈云渠今正是我大地難包裹我今不是渠千聖不能知深得洞山意旨今人容易説洞家兒孫好久摩他鼻孔不著哩適來與麗中談及德山一段機緣也大奇特渠初見龍潭便問久向龍潭及乎到來潭又不見龍又不現潭云子親到龍潭已太煞婆心了也德山當時猶未會得一夕侍立夜久辭出潭點紙燭度與山山才接潭即吹滅山方大悟云從今更不疑天下老和尚舌頭也山僧偶爾得兩頌曾見麼你看龍潭初道子親到龍潭真箇直捷不過古人為人都是恁般直截于今人把作機鋒却反拗直為曲了末法將來畫虎成貍日久生弊得活祖師意底不道全無祇是少有大衆同志須生難遭想努力珍重廣慧示衆舉僧問芭蕉不落諸緣乞師指示蕉云有問有答師云你看古人為人何等直截祇是人自不會便呼善甫云大慧常舉竹篦示人喚作竹篦則觸不喚作竹篦則背不得有語不得無語僧擬議便打出一生如此勘驗學人非真正學人罕有契其機者乃有頌云背觸非遮護明明直舉揚吹毛雖不動遍界是刀鎗山僧深愛此老剖肝瀝膽昨和一頌云吞餌已鈎腸清波亂跳揚絲綸牢在手更不動刀鎗你把大慧竹篦話與我者頌合看不要急祇是念念不放捨自然有箇省處今時人全不解用心你却須自解轉變你若省得時即不會機鋒轉語不會得古人公案也不消熱忙若徒明得古人公案不明自己者明得底都不是此事祇要真古人亦有辨才無礙雨瀉雲興亦有規模窄窄地然悟心則一至説法為人隨家豐儉惟在取信於心今人在義路上求解求會豈有出脫日子你若未明此事須辦久遠堅固之心做工夫祇是一箇切先要識得心識得乃信得及信得須要行得行得須要休得若休不得終非真實所以古人云我於某善知識處得箇歇處你等大須仔細識得信得行得休得有此四者大事畢矣廣慧示衆腳跟下有條直路即心是佛還信得及麼你若未省得祇是冷冷看如何即心是佛一毫不要造作日久自然省去雲門大師云人人盡有光明在看時不見暗昏昏如何是汝諸人光明衆無語復自云厨庫三門所以學道大須知有大須自己伶俐切莫造作今時善知識種種教人總是造作總是埋沒人法華窮子喻長者無限寶藏本是窮子分所應有無奈東西馳走長者捉回渠反怖死長者傷其下劣不能承當乃以冷水洗面令蘇仍復遣去密令二人隨他同彼所作誘令求傭長者祇是令他除糞謂汝勤苦倍與之值種種方便然後窮子信受你看經文何等直捷窮子本來該承父業珍寶具足因他信不及祇是教令除糞三乘四果十地盡是除糞底人方便引誘他故與以值若當下信得及實無恁麼事所以佛之本懷一切權實教門祇是欲令衆生開佛知見六祖云如何佛更開佛知見佛知見即是人人自心所以道凡有心者皆應作佛山僧昨云人非木石豈無心乎此事箇箇具足為何根器淺劣總信不及才舉起便怕認識神且如長沙云學道之人不識真祇為從前認識神原為分箇皂白不許人儱侗你若未認怕作什麼今時善知識總是鈍置學人見一學人入門便教他怎生做工夫節外抽枝總不是佛之本懷若論佛之本懷祇是要人識得此一著子山僧得此一著子與佛無二無別就令將此身碎為微塵一一塵供養十方諸佛亦未足以報佛恩德山云釋迦老子與我同一鼻孔便是文殊普賢來云咨和尚我早已知他了也祇是識心達本源更無有過者若不如是爭敢做善知識開大口爭好揀別諸方鍛鍊衲子昔有僧參一禪師每見即搖手云不是不是如此二十年一日遠遠見便云是是開善謙在大慧門下二十年祇是不省得大慧復令他馳書往襄陽謙益怨憤意欲無往其友宗元叱之云不可路途中便參不得禪遂與同行復語之一切事都替得你祇有五件事替你不得謙問那五件事元云屙屎撒尿著衣喫飯駝箇死尸路上走謙當下領旨比返徑山大慧在亭子上望見便云者漢連骨頭也換過也你看古人絶無定法祇是提掇者一著子要學人自己識得別無言説若見性人如伸手見掌更有什麼大衆還有信得及者麼時有僧進云某甲曾看大慧語録云即心是佛人便以為尋常云燈籠沿壁上天台便以為奇特豈不是順顛倒今日復蒙和尚開示始益信向師云你今祇要信得及若不能直下承當便須時時尋究如何即心是佛終日冷冷看將去若省得了方有語話分不必看語録經教初心學人不曾看書本到是乾淨提獎他到是容易若久參學人打頭不遇作家惹得許多見識及到善知識前先要洗滌一番令淨然後救拔得他今人那裏曉得此事大須有福遇作家始得若薄福人見邪師談禪説道種種枝節便以為有滋味見真善知識一無所有便謂善知識祇是如此更有自甘下劣者謂古人二三十年方才了當終日向外馳求待他馳求二三十年全無下落到此來畢竟要撥轉他向者一條直捷路徑方得安穩不如趁早放下更省氣力咦大象不遊於兔徑大悟不拘於小節希有之法真是難信經云若有人千生勤苦種諸善根如是之人乃可為説若有人千生但讀誦大乘不看餘乘及外道典籍如是之人乃可為説世尊致祝在所遊方勿妄宣傳六祖亦云恐愚人不解謗此法門萬劫千生斷佛種性故知希有難信佛祖祕密大衆直須徹底信得不留一絲毫擬議始得珍重華首挂鐘板示衆師舉椎云大衆還知麼千下萬下皆從者一下起便打板一下復云何以叢林規則以此為據隨打鐘一下歸方丈結制示衆舉圓覺經云以大圓覺為我伽藍身心安居平等性智華首今日以羅浮山為牧牛場溪東溪西一任諸人優遊自在只有一句要緊話不得犯他國王水草汾陽道若一毫頭聖凡情念未盡未免入驢胎馬腹去白雲端又道若一毫頭聖凡情念淨盡亦未免入驢胎馬腹去諸上座又作麼生須是從者裏自作活計始得不見王老師道老僧自小養一頭水牯牛擬向溪東牧不免犯他國王水草擬向溪西牧不免犯他國王水草不如隨分納些些總不見得作麼生是隨分納些些總不見得諸上座汝若會得便是活計一期之內大須努力示衆古人道千人萬人盡是覓佛漢於中求一箇道人無欲與空王為弟子莫教心病最難醫諸上座且道覓佛漢與道人相去多少大須分箇皂白不可顢頇何以故祇為般若有相似底所以道佛祖如生冤家始有學道分汝等離了鄉土離了師長千山萬水行腳到此專為學佛學法為甚却道如生冤家不見洞山云擬將心意學玄宗大似西行却向東汝若將心學佛將心學道窮劫盡形終不能得不如息念忘慮佛自現前今時不得已教人從者邊打翻那邊消息要且圖箇話會其餘有什麼交涉諸上座特地現成擬心即差究實而論不落見聞窠臼乃可歸家穩坐珍重示衆信為道元功德母信是無上佛菩提信能速登解脫門信能永離生死苦諸上座莫輕看者信字法華會上止得箇龍女涅槃會上止得箇廣額屠兒者才是直下信心底人諸上座還信得心麼結制以來不知各人作麼生用心尋常參堂中不是昏沈便是掉舉不知昏沈掉舉就是各人安身立命之所大須伶俐慎勿虗度光陰山僧欲與汝等商量有話試出來説看衆無語師云歲月如箭轉盼蹉跎本分上稍寬緩便容易錯過何況日用間一切人我是非尚放不下又爭搆得諸上座者事祇要各人心切汝若心切撩起便知舉溈山在百丈侍立次丈問誰山曰某甲丈曰汝撥爐中有火否山撥之曰無火丈躬起深撥得少火舉以示之曰汝道無者箇聻山便發悟師云汝看古人何嘗有甚麼忉怛祇要伶俐山僧尋常與汝等千説萬説自己實見得沒傝實見得慚愧諸上座也須知些慚愧始得下座示衆舉長沙投機頌云今日還鄉入大門南泉親道遍乾坤法法分明皆祖父回頭慚愧好兒孫復舉南泉和頌云今日投機事莫論南泉不道遍乾坤還鄉盡是兒孫事祖父從來不出門師云據此偈意則知有向上人作麼生是向上人古人云有佛有法猶是教迹邊事且未是那箇消息若論那箇消息非智能知非識能識即今目前直如一口氣不來方有少分相應若落意根湊泊恰似有箇相應總與那人懸絶所以道損法財滅功德莫不由茲心意識是以禪門了却心頓入無生知見力諸上座心作麼生了無生知見作麼生頓入直須無心者箇無心不是造作得來伶俐衲僧才聞恁麼説便解打翻如今都擬商量者箇無心又爭得永明云若親照時縱有佛祖玄言妙義皆為魔説汝作麼生商量大難大難示衆探究此事實非小緣須要大生尊重始得于今天下説法者恆河沙悟道者如麻似粟都認箇目前昭昭靈靈底古人喚作驢前馬後漢諸上座大須知痛癢始得長沙云目前無一法當處亦無人蕩蕩金剛體非妄亦非真於此直下窺得便乃坐斷聞見萬法平沈淨裸裸絶承當赤灑灑無回互汝若踏著恁麼田地便自解作活計作麼生解作活計聻云何要作活計聻古人大有榜樣在曹山辭洞山洞云子向什麼處去曹云不變異處去洞云不變異處豈有去耶曹云去亦不變異此是第一箇解作活計底榜樣藥山坐石上石頭云子在此作什麼山云一物也不為頭云恁麼則間坐也山云若間坐即為也此是第二箇解作活計底榜樣諸上座還曾恁麼作活計也未山僧今日為汝再流通箇消息且不論遠就是目今父母所生底身一二歲時見聞具足六根怡然心境一如有眼如不見有耳如不聞六用間間正恁麼時十成完具漸漸長大便生愛惡等情從生至老迷而不返且道過在什麼處難道彼時便沒有麼諸上座終日隨聲逐色總是步步踏著若不一回打翻要且無汝作活計處大衆作麼生良久豎拂子云箇中若了全無事體用何妨分不分復以拂子擊案下座示衆古人道莫繫念念成生死河輪回六趣海無見出長波六祖大師亦云前念後念今念念念相續不斷名為繫縛於諸法上念念不住即無縛也所以離念法門最尊最貴最第一惟佛一人乃稱離念不見道悟無念法者萬法盡通悟無念法者見諸佛境界悟無念法者至佛地位汝若不是實落到恁麼田地他時後日決定自信不及為甚如此祇為汝胡孫子不曾死腳跟終不點地從上諸祖全推此著譬若大火聚無汝近傍處無汝依倚處若不如是總要奈何不得雖然如此猶是與得底人説若不打翻父母未生前面目真實去處尚且懡㦬汝又作麼生下手所以千疑萬疑祇是一疑千關萬關祇是一關者一疑破則千疑萬疑俱破者一關透則千關萬關俱透諸上座作麼生是者一關聻良久云喚作竹篦則觸不喚作竹篦則背不得有語不得無語汝等諸人著眼示衆此宗難得其妙切須子細用心未有天生彌勒自然釋迦就是再來底人也要用心一番方才了得所以道惟人自肯乃方親但是言教體貼自己隱微終是難過須實實落落到那田地才肯放心才得箇休歇就是見處的確言句上理會得恰好亦止得一半惟實落到處却難百丈云見與師齊減師半德見過於師方堪傳受諸上座又作麼生於今人不能了得病在甚處病在認目前昭昭靈靈以為是不知昭昭靈靈乃是緣境而有玄沙云若昭昭靈靈是汝真實為什麼瞌睡時不成昭昭靈靈若捨此又是箇黑漆桶打在無見無聞窟裏縱然不涉兩途和合得箇不思議猶是生死岸頭事諸上座古人見性如十日並照總不是者箇道理舉無著禪師往五臺禮文殊遇一老翁問云近自何來著云南方翁云南方佛法如何住持著云末法比丘少奉戒律翁云多少衆著云或三百或五百著却問此間佛法如何住持翁云龍蛇混雜凡聖同居著云多少衆翁云前三三後三三著不省翁拈玻璃盞問云南方還有者箇麼著云無翁云尋常將什麼喫茶著無對辭出翁令童子相送著問童子前三三後三三是多少童子召大德著應諾童云是多少著始悟彼翁蓋即文殊也乃稽首童子乞一偈而別師云前三三後三三既領略不得玻璃盞話又當面錯過童子一召之際依舊貪觀天上月失却手中珠後參仰山始得契悟常充典座文殊現於粥鑊上著以攪竹篦便打云文殊自文殊文喜自文喜那裏落節向者裏拔本諸上座丈夫自有沖霄志不向如來行處行汝各人都是丈夫也有志氣祇如自朝至暮飢來便食渴來便飲何等自由乃至迎賓待客敘寒道溫一般快利不曾分毫計較為什麼問著本分事即便突然汝道病在什麼處就似有人問我手中是甚麼明明白白是箇拂子却放下另討一箇祗對便遠了哩所以得底人更不如何若何併絶咽喉直下無第二人不見曹山四禁偈云莫行心處路不挂本來衣何須正恁麼切忌未生時正與山僧昨日那五問意旨倣佛恁麼田地豈是汝言句到得就是言句到得意還未到何況言句尚未到汝擬向什麼處著大難大難示衆倐忽又是半月敢問諸上座本分事作麼生流光似電瞬息不停切須痛念生死不可逐樂過時大衆試自揣看生死作麼生了雪巖問高峯云日間浩浩地作得主麼峯云作得主夜間睡夢時作得主麼峯云作得主正睡著無夢無想無見無聞主在什麼處峯直得無言可措諸上座無夢無想無見無聞畢竟主在什麼處山僧常道有三箇關頭人多以無夢無想無見無聞時作主難日間浩浩地作主易不知日間浩浩地儘難作主哩于今人不過從五蘊身田中認著箇能見能聞底便道是者喚作弄胡孫子一朝鼓破了胡孫子走了便不知怎麼下落大凡聰明人看些古人語句便似容易得很便道日用間隨處拈來皆是把洞山麻三斤雲門乾矢橛趙州庭前柏樹子和會將來便道無有不是也須分箇真偽始得洞山云我尋常以心中之眼觀之又觀始辨真偽大衆且莫容易却又不是艱難向那裏尋求得底除却目前亦非別有者裏畢竟作麼生雲門云直得乾坤大地無絲毫過患猶是轉句不見一色始是半提更須知有向上全提時節麻三斤乾矢橛庭前柏樹子狗子無佛性等話正是者箇消息切莫草草末法將來人多不圖實落各處叢林住住學些見識一部五燈會元不難領會本分事却實實了不得難道自己不明白麼祇是勝負心拍盲承當過去自誤誤人所以真修行人名聞利養一切不顧只要自家實實了得不拘歲月不辭勞苦你看古人難道根器都是下劣都不像得今人汾陽參了七十一員善知識後見首山方大徹去難道他從前不會禪不會道還有什麼佛法他不曉得為甚見了首山方道萬古碧潭空界月再三撈摝始應知就是圓悟者樣人在五祖處也有十年方才心不異緣今人爭得容易大衆著實努力才好復云山僧福薄自來只喜退步今日既在此提持箇事已説不得了但一切餘事須仗大衆出力叢林原沒有什麼爾我都是一般就堂中堂外也沒有分別但堂中為一衆標榜都要規矩森嚴山僧最不喜人間談三箇五箇聚在一處説幾句話便是一炷香日子有多少長就是堂外也須切戒各人自有本等職事須出一片至誠精勤做去難道各人自家住靜不精勤做得麼飯自家會熟菜自家會長麼山僧自小也是住靜日間不過間得一炷香般柴運水燒鍋掘地那一件事不是自己于今叢林一人當一件職事極好埋頭修行山僧恨不得混在衆中埋頭修行極是有趣極是安間真淨云浮生惟有僧無事悟得真乘老更間世間惟有解修行底越老越間不似俗人一生奔奔波波到後來總倚靠不得大衆無非多生修來今生得為衲子在此箇門中知有此箇大事須要乘時精進早求解脫莫待他時悔之無及中峯云一箇主人翁既失百千皮袋子難醫珍重示衆毫釐繫念三途業因瞥爾情生萬劫羈鎖諸上座趁好色力各各討箇入路得箇入路還要有箇出身始得者不是輕易得底再三撈摝方才了當趙州十八歲上便解破家散宅尚且云除二時粥飯是雜用心處于今人怎容易搆得然雖如此者箇事也甚明白不見僧問慈明如何是古佛家風明云銀蟾初出海何處不分明高峯頌云銀蟾出海照無私處處分明是阿誰覿面不須重問訊隨教日炙與風吹直下曉得又何消説如或未然切莫瞞却自己昔湛堂語大慧云杲上座我者裏禪你都會得叫你説也説得叫你答話也答得叫你拈古作頌也拈頌得祇是欠者一解在你若不得者一解在我方丈裏有禪才出去便沒了惺惺時有禪睡著便沒了如何抵敵得生死大慧云正是某甲疑處你看古人多少實落渠當時未見圓悟諸方那一箇不肯他祇是自不肯甘心諸上座各各求箇自己甘心生死到來方有把柄為甚如此為他得底人二六時中總沒有空過底時節當時香林在雲門十八年門每日喚他一日省得了門云我從今後不喚你也他後來却云我四十年方才打成一片涌泉亦云汝等諸人莫開大口老僧四十九年猶有走作你看古人都是實落行將去不圖明得便了就是山僧自小便曉得二三十年方才休歇得下所以古人道明道者多行道者少于今假知識遍滿天下便是明得底也少直饒你有箇入處正好修行正好親近善知識涌泉又云學道人大須識乾識若不乾敢保輪回去在敢保啼哭有日在于今人才嗅著些子便自掉頭不顧不知他生死作麼生了哩諸上座努力向前切莫空過趙州云佛之一字吾不喜聞佛之一字尚不喜聞還更有什麼可雜用心處莫見世間少年利根做得快便便道佛法祇是如此不知他夙生也苦心過來若是中下之機畢竟要看箇話頭行而參坐而究縱然今生不得悟來生出頭亦不費力總是各人要生死心切始得珍重示衆若真修道人不見世間過若見他人非自非却是左他非我不非我非自有過但自却非心打除煩惱破憎愛不關心長伸兩腳臥六祖大師恁麼語話雖則平白其實正是向上人底行履不似今人掠虗道理上簇花簇錦有什麼難尋常憎愛是非底心容易消遣不得達磨初祖云外息諸緣內心無喘心如牆壁方可入道二祖安心之後才對他説豈更別有祇是圖箇實落于今勿論內心無喘祇如外息諸緣一句作麼生目前山河大地明暗色空外既有境則內必有心心境相對動輒傷鋒須是知有底人方才在者裏平帖帖地不犯絲毫頭手腳若未到者田地也勉強不得待你覺照將來早是錯過了也咦一得無心便道情六門休歇不勞形有緣不是豫朋友無用雙眉却弟兄良久云已過不可得常思於後念念圓明者都為他得底人方解與麼話不然才有所重便成窠臼須是轉轆轆地始得示衆僧問心地無非自性戒如何是自性戒師云今日有居士從泊頭來進云戒光從口出如何是戒光師云好大雨進云破戒之人為甚不墮地獄師云無孔鐵鎚進云恁麼則泥牛吼破天邊月木馬騰空過北關師便喝進云好一喝師云且退僧禮拜起云啞人唱罷無生曲黑月堂前拍掌遊師云敗闕不少又一僧才出師便喝僧擬進師云背後有人笑你在舉僧問龍牙二鼠侵藤時如何牙云闍黎須有隱身處始得師召大衆云且道如何是隱身處昔有四兄弟同得仙道預知命盡一箇隱在水中一箇隱在空中一箇隱在石中一箇隱在人中及至無常到來隱水者畢竟從水而溺隱空者從空而墮隱石者從石而破隱人中者從人中而亡須知者都不是隱身處且作麼生才是隱身處又有無常捉一僧僧懇其寬限七日無常許諾七日後復來覓其僧竟不可得大衆還知者僧著落麼知得者僧著落生死到來方才有隱身之法不然未免手忙腳亂此事須及時了辦非力可求非他人可代山僧自幼學道只是自家痛念生死無計可了後來讀壇經云見性成佛如釘入木千方百計祇求見性最苦嶺南前二三十年無一人談及箇事漫道箇事就持戒念佛也少山僧當此時設有一人為我剖斷便願身為牀座身為奴僕閲人頗多並無所遇只是一部壇經行坐不捨如今得箇著落線索原從者裏來憶當時但願者事停當便深山窮谷野鹿為羣就使在十字街頭破衣粗飯終日叫化也都甘心後同靈泌弟參博山便絶念嶺南只為法字卍子與山僧夙緣特到博山相覓不得又抵金輪關中一見涕淚交下便惹起如今首座都寺監寺藏主書記諸子又得韓夫人一門信向因緣會聚偶爾成文實非山僧初願去年都寺到匡山時山僧還遲疑未決念大衆費了許多心力又纍承相逼情詞懇至事不獲已似山僧素喜深隱却疑小乘然憶天台大師臨去時衆弟子問其所證地位大師云吾不領衆必淨六根今損己為人獲預五品耳蓋菩薩行實實難行自己煩惱令其不起猶易令他人不起煩惱甚難只好隨自家力量盡自家精神倘能信諒也斷不致孤負而已山僧初到此時聞麗首座云如今只是揉爛其心始得山僧銘入心髓得首座恁麼不惜勤苦山僧也合𢬵一副心力大家鼓舞但一切外務多病之人却難照管全仗大衆幫扶此是十方叢林原不分內外坐禪底坐禪行行底行行也都是一般如今都道坐禪底高行行底低一箇知隨便沒人肯做可笑得很難道行行底真箇便低麼雪峯飯頭溈山典座千古景仰雲門法眼兩宗都從雪峯出來溈山便出箇仰山是什麼人却肯當飯頭當典座大菩薩隱在衆中行行底極多若者些子人我都忘不得還説什麼大事自今以後大衆須放出一片公心莫分彼此莫分高下努力向前同報釋迦老子恩德一場也非分外山僧與大衆住此將半年四月又到結制在邇須是事事料理妥當始得大衆叢林規矩決定要行不可徒有其名山僧今晚不惜剖肝瀝膽向大衆説大衆須要共體此心便是戒之一事甚不可忽于今末法比不得上古若只圖向上之名其實所行不及中下何等可恥目見頽風益當防慎就是傅大士臨寂囑其子普建普成二法師亦曰謹防三業莫道三歲孩兒也恁麼道得空開大口災田無一簣之功鐵圍受百刑之痛久立珍重示衆無量妙法門參禪第一義若真師子兒不入他群隊諸上座若論超生死捷徑惟有此宗其餘俱是方便汝試反覆思惟畢竟是箇什麼嘗見有種人不明心地祇就道理上東安西排學者不成學那不就到底落得一空汝但向心地上討得箇入路久久自然脫落何不上早勞苦一番直待眼光落地時只是隻落湯螃蟹遲了也佛説人命在一呼吸間汝等於今刻刻甘心死得去便罷若未能死得去便須急急覓箇方便高峯云但將箇無滋味話頭蘊之於懷行而參坐而究自然有箇入路亦不是別討道理止貴言下知歸切須大家打起精神看什麼處有疑祇管疑將去大疑大悟小疑小悟不疑不悟古人者話決定不錯汝但自己揣量畢竟到底如何發付莫要放過者便是疑不必另作計較山僧常時聞諸禪人道疑情如何發得起如何發不起只管向話頭上覓道理籌度大覺好笑疑之一字切之別名耳總是生死心切便自起疑疑來疑去自然有箇時節若泛泛過日不實用心待他自悟決無此理諸上座趁早著力昔有商人同一比丘入海遇一惡龍興大風浪向商人言但將者比丘與我便了此我夙生之師不肯教我修行致我受此業報痛苦無量心甚恨之山僧今日至誠相告信也由汝不信也由汝他時後日却怨山僧不得若道我真師子兒不入者箇群隊也須實到恁麼田地黑面老子惡辣不準汝口説便是黃面老子慈悲也不曾準汝口説在珍重示衆諸上座三界塵勞如海闊無古無今鬧聒聒盡向自家心念生一念不生都解脫既由自己又何難成佛無勞一指彈恁麼看來容易得很然雖如是也要是箇人始得古人又道瞥起一念是境但無一念便是境亡心自滅無復可追尋若夙生有善根者聞恁麼説直下便了其或鈍根反覆看他畢竟是什麼道理此事祇要疑所以高峯云只要惺惺著意疑疑到情忘心絶處金烏夜半掣天飛諸上座祇是汝自家底縱然不悟也寸步不曾離珍重示衆佛法在什麼處在穿衣喫飯處般柴運水處迎賓送客處才舉心動念便不是了也諸上座勿向外求須徹見自心實踐將去方才有箇著落剃除鬚髮向此門中畢竟為箇什麼世間人為些小功名尚且廢寢忘餐豈況生死大事多少在家人聞有此事千方百計要求出離如何出家人終日在善知識身邊千提萬提反不將為事凡人未有生而知之者總要心切明明白白偏汝搆不得過在於何過在汝縱逸即有時觸著轉眼消滅依舊業識茫茫如此等甚多不似上古純素真切聞得便信得信得便行得箇箇出家便以此為急千山萬水訪尋有道祇求決了箇事決不遊州獵縣片衣口食虗度光陰諸上座此事大不容易汝若貢高我慢祇障礙得汝自己山僧自小便明此事常去禮下於人縱有説不相干底我亦禮拜何以故我求決了我底事管他是不是作麼如今做學人便做出善知識樣子生怕減了聲價一般叵耐自己胸中黑漫漫地初祖云豈以小德小智輕心慢心欲冀真乘徒自勤苦汝等欲做真正衲子勿學時流把者些惡知見盡情放下放教空蕩蕩地才好用心才好受得善知識鍛鍊若不如是大遠在珍重博山老和尚忌日示衆得有因兮事有由山僧自小便知有箇事十四歲見壇經已識自己面目便不向外馳逐惟有宗門巴鼻尚未了得及參石壓笋斜出崖懸花倒生語始得撇脫特恨彼時嶺南無善知識無可證據己巳年度嶺去博山見先師先師亦不曾向我説一箇元字腳一日拈倒騎牛入佛殿語問山僧山僧呈偈云貪程不覺曉愈求愈轉渺相逢正是渠才是猶顛倒蟻子牽大磨石人撫掌笑別是活生機不落宮商調先師云太粗生山僧云假使大了當人向和尚作麼生開口先師顧視良久云何消説山僧於此洞見先師為人處庚午四月山僧辭先師先師苦留不得囑以八月必要重來再三相訂不謂先師九月示寂所以道得有因兮事有由今日者炷香不敢孤負先師良久召大衆云先師真儀在者裏先師畢竟在什麼處以拂子作圓相云巍巍堂堂蓋聲騎色遍界不曾藏咦分明祇者是太郎當示衆此事無他在聖不增在凡不減祇因染淨而有差別南嶽云一切諸法從心想生心若不生法無能住若達心地所作無礙非遇上根宜慎辭哉汝等但信自心心外無法一切諸法依心建立離心之外實無可得諸上座但向自心一念回光般若靈智天然自照好不省力今時人祇是向外馳求覓些有依傍底義解做些有捉把底工夫以為肯綮於本分事上便黑漫漫地誠可憐愍此事猶如虗空亦如身與影直是無汝回避處何不立地搆去良久云分明極復云太分明極咦祇為分明極翻令所得遲珍重示衆諸上座一月過一月一日過一日作麼生用心須要徹首徹尾你看古人在者裏坐破七箇蒲團是何等用心今人發腳參方便想秉拂開堂趙州道汝但究理坐看三二十年若不會截取老僧頭去佛法無多子久長難得人山僧三十年前在博山見苦心參究底人尚多如今絶不見用心者一種用心只是將心待悟此病入了膏肓畢生不治大衆切須老實做去無論三二十年就使一生不徹亦如此做去但存一副乾淨肚腸有何相為不得示衆諸上座莫妄想終日學言語逞伎倆做頌做偈在書本上討消息有什麼益宗門底事若在書本上三藏十二分教豈是無言云何達磨西來一切掃却何不直下休歇去邇來禪道弊病不可枚舉有一種心識浩浩底揑怪不休惹得無限人弄業識有一種專向蒲團上死坐遏捺起滅鬼窟裏作活計佛眼云諸方不是坐殺汝便是走殺汝學人大須仔細諸上座仔細討看却是淡然無意時好箇消息只是你特地不會開眼合眼上單下單畢竟是誰還會麼珍重示衆古人到大了當猶自深藏丘壑龍天推逼方出為人諸上座步步踏實地去有餘於己乃可及物不見陸亘大夫問南泉云黃梅七百人如何不得衣鉢獨盧行者得衣鉢泉云七百人都會佛法惟盧行者不會佛法如今衲子無不道我會佛法試問他一句便眼睛定動究其病處只為強露頭角不向腳跟下用工夫所以古人道愈退愈明愈不會愈有力量且道不會箇什麼汝若未到者箇田地直饒會盡道理只成箇狂人無智人去爭解與人抽釘楔先博山嘗言我過後二十年宗風掃地土地廟裏也上堂了也當日猶意有激而言不圖今日親見此事可歎可歎示衆竹篦子因緣極直截痛快山僧掩關金輪時見一僧端坐石上問他做甚工夫答云看竹篦子問他作麼生看答云於不明處進前愈追山僧向他道汝却要退後看始得且看者箇不明底是什麼道理渠於此覺有痛癢山僧只略略點他一句便依所説做去夜半忽然有省山僧舉芭蕉拄杖子話驗之如何是汝有拄杖子我與汝拄杖子答云空中掃鳥迹如何是汝無拄杖子我奪却汝拄杖子答云紅爐一點雪豈不快哉所以者箇事切在得之於心自然轉轆轆地珍重示衆山僧事不獲已住持茲山固承宰官居士殷勤啓請實亦自見十九代祖師道場無人整頓放心不下但今草創四事未備大衆果以道相親不得因淡薄退念耐得淡薄便是入道根器山僧平昔每祝韋馱菩薩願得與世無緣不是矯情就令福緣具足一出驚天動地於本分事有何交涉即如世尊四十九年三百餘會説法無量人天得度一場事迹如夢如幻何況世間身衣口食豐濃受用終歸變滅汝等為生死出家須認取箇不變滅底六祖先期辭衆衆皆悲泣祖云我自知去處故向汝説只今還有知六祖去處者麼看看音釋哩力忌切音吏語餘聲瀝郎擊切音歷淩也傝上他紺切舑去聲下悉盍切音靸惡也一曰不謹貌鑊胡郭切音獲釜屬災側持切音緇不耕田也
