body:
  text: 丹霞法孫今釋重編頌古三玄三要示張莂公孝廉仰山云百丈得大機黃檗得大用餘者盡是唱導之師臨濟云大凡舉唱宗乘一句須具三玄一玄具三要汾陽深得其旨方才頌出其實不分然又非儱侗古塔主分體中句中玄中已失古人意今時杜撰則又烏焉成馬矣第一玄貍奴白牯解相傳碧眼老胡偷吐舌忍氣吞聲不敢言第二玄左右盡逢源冤家難解結急著眼睛看第三玄森羅宇宙寬頭頭是活計豈費草鞋錢第一要天光不報曉釋迦彌勒不知名肯向人間留眹兆第二要樵歌牧唱真奇妙爭奈途中眼未開費了許多鹽醬料第三要大地蒼生同此調折旋俯仰跳不出業識茫茫真可笑三玄總頌用中得體號為玄明明一句絶廉纖變換自然生活計鐵壁銀山橫面前三要總頌體中顯用名為要祇貴學人正眼開一句明明全具足當機巧妙任師裁曹山三墮水牯牛兒事最精惟知念草絶餘情時人若解通消息渴飲飢餐總現成類墮任運騰騰聲色中情忘向背境心融依然仍舊無勞力真個真空不住空隨墮佛祖位中留不得隨緣且作住山翁山中自有山中趣御饌珍羞永不逢尊貴墮風幡不是風兮不是幡關山把截路行難時人祇管貪程去那曉全身在此間風幡不動仁心動自古來今真便宜若論拈花重注腳祖師猶占最初機不是風幡不是心祖師到此絶知音人言富有千金好何似中人坐竹林不是風幡正是心橫趨直撞莫沈吟若人識得東君面萬紫千紅春正深丹霞燒木佛三冬寒氣冷難挨木佛將來劈作柴身暖寒消無別謂禪人休更亂疑猜茅鐮子茅鐮子三十錢人人都曉得問著便茫然南泉斬貓貓兒按下有分拏叵耐禪流不作家王令已行難躲避將軍塞外漫矜誇兩堂雲水鼓風濤奇特南泉下一刀救得不得都莫論不英豪處逞英豪活貓兒咬死貓兒請問禪流知不知一個堂堂無事漢橫趨直撞總由伊手把狸奴下一刀禪人何必口叨叨知音惟有趙州老草鞋頭頂賣風騷趙州勘婆子臺山大路如弦直來往師僧真飽參婆子趙州頭角露却令人見轉羞慚年老成精老趙州助婆作惡起戈矛臺山大路依然在祇要行人肯點頭臨濟三玄洪罏翻雪浪海底起塵煙人天既不會佛祖亦忘言寒山逢拾得撫掌笑喧喧傍人都不曉却道是風顛陽春布德澤清明三月天嫫母連宵織耕夫忙種田世尊初生指天指地獨稱尊為愍羣生出此言賴得雲門知變態不然空費老婆禪見怪不怪其怪自壞雲門善解機宜禍才生處便消除奇奇好事不如無世尊悟道寥寥獨坐霜天後一睹明星便發機若也早知燈是火原來飯熟已多時世尊問豬子歷歷分明在目前何須動舌起言端雖云佛具一切智也要儂家莫被瞞大通智勝佛惟此一心凡聖母十成圓備莫他求若云成佛不成佛盡落今時門底收城東老母本是天然一尊佛緣何特地而乖張虗空有盡渠無盡五指那能解覆藏趙州無人人一雙無事手隨分拈花和折柳若人問手在何處但示花柳不言手問性惟將無字酬勿隨言覓急回頭忽然踏著來時路始知人解倒騎牛趙州道無言中有響急著眼看祇者伎倆狗子佛性道有道無老趙州禪和奚不看來由可憐泣路亡羊者盡從無有裏淹留日裏看山三三該九四四十六有米煮飯沒米煮粥大慧竹篦吞餌已鈎腸清波亂跳揚絲綸牢在手更不動刀鎗竹篦背觸為君舉狹路相逢無處避堂堂一個丈夫兒有志氣時添志氣竹篦直截為君説真個甕中不走鱉不用如何與若何曠劫無明從此歇老僧舉起竹篦禪和開口即非背觸俱非勿動急急撒手來歸婆子燒菴主賓相扣有來機腦後金鎚太煞奇眹兆不留空坦坦寒巖枯木緑依依婆子燒菴事太奇諸方傳説盡參差明修棧道人皆曉暗渡陳倉幾個知殺活縱橫縱奪機暗藏春色使人疑瞎驢滅却些兒在千古還他老古錐正恁麼時意若何寒巖枯木寄婆婆趁去燒菴情太毒却令人見轉淆訛未離兜率已降王宮未出母胎度人已畢未離兜率降王宮一期佛事已周融非但瞿曇自如此諸人鼻孔一般同大隨壞壞壞石頭土塊隨隨鳥語花飛澄潭不見蒼龍影但看興雲布霧時九峯不肯首座香煙才起便歸去個是叢林老作家若論先師末後意九峯亦未其涯無見無聞主在什麼處無見無聞主在麼相隨來也沒如何誰家門首無明月叵耐夜行人更多玄沙三種病人盲聾喑啞最親切聞見覺知無二別韶陽老子太乖張盡把家珍都潑撒望州亭烏石嶺僧堂前相見大地拈來如粟米相見相呈亦偶然若論歸家田地穩鵝湖保福解推遷陸亘大夫家中片石行船盡在把梢人信手拈來著著親雲山水月都遊盡滿腔心事與誰論魯祖面壁壁立萬仞接上機何勞簸者口唇皮當時若是高亭老實勝南泉王老師法眼捲簾一得一失摩訶般若波羅蜜剔起眉毛惺惺惺一得一失是何物德山到龍潭不見潭兮不見龍吹燈方覺在其中雖然不疑天下老猶與從前未悟同俱胝一指萬派千流都是水七金五嶽總須彌逢人遇物豎一指塵世終然有子期疏山壽塔一文二文與三文一寸龜毛重九斤和尚此生不得塔饒伊狼籍在荒岑馬祖一喝百丈三日耳聾金翅鳥王當宇宙個中那個是超羣一撾塗毒聞皆喪不是愁腸也斷魂巍巍獨坐大雄峯生涯喪盡絶行蹤幸得祖翁田地好兒孫從此振宗風投子油瓶油油莫是投子麼鴛鴦繡出從君看不把金針度與人晏國師因雪峯攔胸把住有省將謂何奇特元來祇恁麼昔年何處去今亦不較多婆子拋兒南柯夢醒豁精神個中何必較疏親呈橈舞棹休誇弄君向瀟湘我向秦十智同真一同一質淫坊酒肆逢彌勒城東老母避不得摩訶般若波羅蜜二同大事信手拈來都是從今莫歎家貧有志氣時添志氣三總同參耕夫織婦和南一一天真明妙何必南詢五十三四同真智從來不許人知碧眼老胡不識白牯狸奴皺眉五同遍普東家打鼓西家舞巴歌社酒笑嬉嬉樂在其中人不知六同具足包天裹地無餘物欲進進無門欲退退不得七同得失左邊牆右邊壁成也蕭何敗也何忍氣吞聲莫叫屈八同生殺隨手拈來是藥有時珠玉八珍有時糞堆搕𢶍九同音吼溪聲山色全周觀音將錢買胡餅元來却是個饅頭十同得入化城且暫歇息菴內不知庵外事玉殿苔生赤骨力總頌十智同真分明舉似更莫擬議五位君臣正中偏混沌不分空劫前堂堂宇宙無人識恍惚依稀未易言偏中正更無一物可當情途中解唱還鄉曲肯將幽趣博虗名正中來看渠也俊哉二途俱不涉何用有安排兼中至者裏渾然忘彼此忘彼此放去收來帖帖地兼中到古今至此無人會於中那個出頭人都來弄巧反成拙偈答錢沃心督學問肚飢必想飯身冷必思衣起滅尚未停云何謂息機肚飢思飯冷思衣起滅紛紛是阿誰從此萬緣都歇罷饒伊門外亂針錐問靜定名曰禪風動名曰波靜定若澄潭風波從何起清淨本心原靜定才生一念便淆訛諦觀此念原無有自此澄潭絶浪波問期場七十完百日餘三十絶後而再蘇阿誰有血出須知日日道場中絶後再蘇始見功老父從來不借借兒孫門外逞威風問生滅時時有圓明隨地得請問衆禪人那個不遭屈生滅元無有圓明無可得個個丈夫兒有志氣時添志氣問開口成思慮無言猶死句有無皆不成何處是去住開口非思慮無言非死句縱橫總是我去住更由誰問頓悟稱見得本性有形否謂空不是空云有未曾有謂空不是空云有亦非有仰鑽瞻觀徒費力你若無心我也休問舊年何處去新年何處來若言沒來處百草有憑據去年無處去新年無處來奇哉端的意萬卉向春開問德山有一棒臨濟有一喝世間些小事相見若為合德山棒臨濟喝覿面當機疾雖然若遇惡竦禪和須要藏身退步始得別真妄偈真法性本淨叵耐人不知不知與淨性非一亦非二真妄元無性總是法緣起悟時順真如無終似有始迷時違真性有終而無始迷悟性皆空無終亦無始不是真生妄迷真妄遂起既達妄無體云何不可止因緣性空故何生復何死法華窮子偈多時馳騁在他鄉險峻關山路渺茫五十餘年人事別歸來元是舊行藏拄杖偈把住放行渠藉我登高下險我由渠渠無有我何能活我得渠用任伸舒渠我元來無兩個我渠何得有親疏自今以後無分別相將攜手作良圖長慶挂鐘板偈有句無句古今傳樹倒藤枯幾百年此日宗風重整頓相隨來也大家看戒衣偈黃梅夜半偷傳去纍得兒孫天下忙𢆝到嶺頭無避處當陽拋出大家看化鐘偈明暗文殊見觀音動靜機鍠鍠聲聒耳且道是阿誰答馬僧摩居士一句當陽難下口未言早已落前溪山僧不解間忉怛居士何須説悟迷示熊心開總理聖凡無別一知通你我心源性相同且喜夙生緣偶合腰纏騎鶴契吾宗偶作帶水拖泥入嶺南不知何處是家山千年常住一朝客野老恆冥如是觀贈法字吾道無人識憑君一線通君心我心合是以到其中贈麗中風幡一頌解投機千里同風事亦奇三到黃巖問端的實知野老不相欺示二嚴生滅門頭一念回空王傳令子歸來大家團聚談今古莫愧從前眼未開示圓實子歸就父通消息父信子言而發心所有功德全是子須知老父不出門示法緯法樹兩侍者還匡山修行活計子無他惟有無心更莫加心若不生無一事心生念動事如麻又塵勞煩惱雖無性叵耐似生相續多尅念殷勤休懶惰大通雙眼又如何示能素韓夫人不思善兮不思惡祇者不思是什麼莫道多年不相識依然還是老婆婆示禪者四方八面都無路祇貴闍黎著眼看釣竿已在漁人手不必貪程過遠山聞樵雲訃音年來莫作世情觀最喜山居半掩門聞訃却令心愈寂爾因心地久盤桓示道者從來佛法無多子才恁麼即不恁麼踏著上頭關棙子百千三昧一時屙示僧日日日從東畔出朝朝雞向五更啼於中若具金剛眼阿嫂元是大哥妻麗中是首座住持訶林遣可都寺持送拂子一枝偈以表信祖祖相傳祇一心青原南嶽不須分三玄照用非他立五位君臣為此陳棒下無生凡聖絶臨機不見有師僧訶林重豎風幡論却幸吾宗代有人定宗上座遠來乞偈截鐵咬釘容易事藕絲難斷事尤長人無遠預張良計恐落儂家鹽醬缸又楚水秦山遠度難闍黎莫作等間看丁寧急下擒王手不動風幡仔細參淵禪還華首將謂宗門有祕傳那知空隱總無言如今䇿杖羅浮去火種刀耕華首邊示祖心還華首飛雲頂上看明月正是歸宗斫額時南北東西同此意心心只許祖心知又橫挑拄杖不顧人直入羅浮深又深黃葉菜根記收拾恐隨流水動知音示勤拽往華首參罷諸方五味禪生涯只在钁頭邊若人來扣其中意劈口捶他一兩拳示西水禪人未言先領猶遲刻句下翻身未是能大丈夫兒當自決勿留禪字賺平生示張玉叔州守大丈夫當猛烈浮華光景水中月陽焰翻波豈足言空花落影那堪説惟有真如無上珠亘古亘今鎮常徹不從緣豈可滅六根門首真明潔達磨西土不將來可祖無得便休歇知君多佛植靈根丁寧莫負好時節示行者罪福從緣起緣生性本空若知無性理當下出樊籠示戒摩行者如魚在水鳥飛空往返周旋在此中擬議知君不可見無心處處入圓通示印平禪人直下信得及更無第二人但有路可上更高人也行題靈泌頌古遺筆靈泌一去無消息空餘靈泌之遺筆筆迹豫知非昔人留之以慰豫之心你我一空豫久知非但久知兼深思我得此個空三昧所以生死之情離靈泌靈泌三十七年如昨夢再過百年亦如之噫世間如幻住你我本來無禮金輪塔凌空一突兀不與衆為鄰四面攀躋絶萬峯回互新頭頭真舍利處處本師身今日親瞻覲遙思負鐵人答周少司農元亮祝壽四首自慚福慧薄度世亦應難荷葉堪為服黃精可當餐緣何無事衲得遇現身官一種沒絃曲知音能解彈又是法住法位都緣物不遷根塵無過咎聲色好安禪睹角知牛在看煙識火然明明親見得那更有中邊又一入空門裏尋思不計年愛枯乾慧地花落淨居天取舍情忘盡長伸兩腳眠茅菴獨坐處戶外草芊芊又作佛元容易才疑便不成謾誇臨濟喝曾認偃溪聲道直猶為曲言空亦強名偶來塵世上知是幾多庚答棲壑大師金輪相別後屈指草餘年世事如無有真機只目前我猶鴻鴈影君享水雲緣異日重期處天湖最上顛贊觀世音菩薩贊眼能見耳能聞天真明妙不須尋眼見色時色非色耳聞聲處聲非聲者個天然真佛性威音那畔到於今大丈夫兒高著眼本來舊佛要新成觀音與我元同體祇因染淨便區分若能一念回光照全體聖心無二人眼見色時被色轉耳聞聲處被聲淪曠劫至今迷不返遂爾結成生死根若能念彼觀音力此迷無本性元空性原空枷鎖自然得解脫鑊湯爐炭頓銷鎔又豫聞大士不自觀音以觀觀者故能令衆生見聞獲益苦與樂如空谷響應物成音在眼而見在耳而聞頭頭出現處處分身大士與我無第二人覓則不見疑即天淵不疑不覓觀音現前欲見大士應如是觀經云觀身實相觀佛亦然博山和尚像贊泥牛入水覓無蹤雪重霜嚴路不通欲識吾師真面目桃花依舊笑春風自讚函是請佛佛惟傳本體師師密付本心全憑者一著是子效殷勤須知更上一陵層咦目前無闍黎此間無老僧又函可請者漢太脫空自己尚無立錐之地別人何處可通風生平祇自信不與時人同即心是佛信入骨髓本擬深藏山谷不許人知咦何期可子效熊耳又函濟請者個漢看來似老實心事人難識畢竟無他長祇是中了達磨大師之遺毒自家誤賺猶可叵耐出言還不收拾每向人前口口聲聲道即心是佛惹得人起謗渠心猶未息又函卍請才與麼便不與麼且道者個是我不是我若道是我我不與麼若道不是我我非不與麼不與麼非不與麼畢竟如何唐言乞士梵語苾芻又函具請卍具侍側即心是佛即心是法即心是僧者老漢平生只此伎倆自家玩賞不已近來亦有知音二人同心其利斷金何況又三人咦大家齊著力報佛恩報祖恩不可獨善其身須作個般若功臣又函蔭請者師僧面黃眼大才出娘胎便揑怪祇求見性成佛人間事事都不愛碌碌勞勞四十年如今不直半文錢常思自己甘心處將謂無人識不料蔭闍黎立盡門前三尺雪又華首請者老子一生愚魯凡百無能你底些兒伎倆不過識得一個心年深歲久愈老愈精却來引誘世間人絶無文采又不尖新諸方笑你祇是一卷壇經時人恁麼説知汝亦甘心咦孰是孰非黍麥難分雖然人不識汝亦有知音又海幢請上無攀仰下絶己躬外離離相內微離空佛祖位中留不得由來祇者住山翁囦教授贊者廝兒看渠真灑落破衲芒鞋蕭然獨脫十字街頭東嚗西嚗自己一身沒得求祇為衆人討安樂咦忽然撞著其中人許多撈摝亦不惡銘銘拄杖付剩人長老元是汝底今還與汝惟論見性不拘文字咦當陽展用任君裁洞上一宗方在子音釋撾張瓜切音髽擊鼓也帖他協切音貼妥帖定也鍠胡光切音黃鐘鼓聲鍠鍠樂之聲也囦古淵字物萌於囦深廣貌嚗披教切音炮然聲也
